<style>
  :root{--paper:#FBFAF5;--card:#FFFFFF;--ink:#1A201C;--muted:#7C786E;--line:#E7E2D6;
    --gold:#B8761A;--gold-soft:#F3E6CC;--cellar:#26402F;--cellar-2:#32513D;
    --rust:#A8421C;--rust-soft:#F6DDD2;--blue:#2C4356;--blue-soft:#E2E8EE;
    --green-ok:#3F6B4E;--green-soft:#E4F0E7;--amber:#C66A1E;
    --shadow:0 1px 2px rgba(26,32,28,.06),0 8px 24px -16px rgba(26,32,28,.25);--r:14px;}
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:Inter,system-ui,sans-serif;font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
  .mono{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums}
  h1,h2,h3{font-family:"Bricolage Grotesque",sans-serif;margin:0;letter-spacing:-.01em}
  button{font-family:inherit;cursor:pointer}input,select{font-family:inherit;font-size:14px}
  ::selection{background:var(--gold-soft)}
  .app{display:grid;grid-template-columns:232px 1fr;min-height:100vh}
  .side{background:var(--cellar);color:#E9EFE9;padding:22px 16px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh}
  .brand{display:flex;align-items:baseline;gap:8px;padding:4px 8px 22px}
  .brand .logo{width:26px;height:26px;border-radius:7px;background:linear-gradient(160deg,var(--gold),#8A560E);display:inline-block;position:relative;flex:0 0 auto;box-shadow:inset 0 -6px 8px -4px rgba(0,0,0,.4)}
  .brand .logo::after{content:"";position:absolute;left:5px;right:5px;top:5px;height:5px;border-radius:3px;background:rgba(255,255,255,.7)}
  .brand b{font-family:"Bricolage Grotesque";font-weight:800;font-size:19px;color:#fff;letter-spacing:-.02em}
  .brand span{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:#9DB6A3}
  .nav{display:flex;flex-direction:column;gap:2px;margin-top:4px}
  .nav button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;background:transparent;border:0;color:#CBD8CD;padding:9px 11px;border-radius:9px;font-size:13.5px;font-weight:500;transition:.15s}
  .nav button .ic{width:17px;height:17px;flex:0 0 auto;opacity:.85}
  .nav button:hover{background:rgba(255,255,255,.06);color:#fff}
  .nav button.active{background:var(--gold);color:#241500;font-weight:600}
  .nav button.subnav{padding-left:30px;font-size:12.5px;color:#A9BBB0}
  .nav button.subnav .subdot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.5;flex:0 0 auto}
  .nav button.subnav.active{background:rgba(184,118,26,.22);color:#F0C98A;font-weight:600}
  .nav button.subnav.active .subdot{opacity:1}
  #nav-equip-pai.active{background:rgba(255,255,255,.06);color:#fff}
  #nav-equip-pai.active:not(.curequip){background:rgba(255,255,255,.06)}
  .nav .sep{height:1px;background:rgba(255,255,255,.1);margin:8px 8px}
  .side .foot{margin-top:auto;font-size:11px;color:#84A089;padding:8px;line-height:1.5}
  .main{padding:30px 38px 60px;max-width:1180px}
  .head{display:flex;align-items:flex-end;justify-content:space-between;gap:18px;margin-bottom:26px;flex-wrap:wrap}
  .head .eyebrow{font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);font-weight:600;margin-bottom:5px}
  .head h1{font-size:30px;font-weight:700}.head p{margin:6px 0 0;color:var(--muted);max-width:56ch}
  .btn{border:0;border-radius:10px;padding:10px 16px;font-weight:600;font-size:13.5px}
  .btn.primary{background:var(--cellar);color:#fff}.btn.primary:hover{background:var(--cellar-2)}
  .btn.gold{background:var(--gold);color:#241500}.btn.gold:hover{filter:brightness(1.05)}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink)}.btn.ghost:hover{border-color:var(--ink)}
  .btn.sm{padding:6px 11px;font-size:12px;border-radius:8px}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:26px}
  .stat{background:var(--card);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--shadow)}
  .stat .k{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600}
  .stat .v{font-family:"Bricolage Grotesque";font-weight:800;font-size:28px;margin-top:6px;letter-spacing:-.02em}
  .stat .v small{font-size:14px;font-weight:600;color:var(--muted);font-family:Inter}
  .stat .sub{font-size:12px;color:var(--muted);margin-top:2px}
  .panel{background:var(--card);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);overflow:hidden;margin-bottom:18px}
  .panel h2{font-size:16px;font-weight:700;padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:10px}
  .panel h2 .tag{font-size:11px;font-weight:600;color:var(--muted);letter-spacing:.04em}
  table{width:100%;border-collapse:collapse}
  th{text-align:left;font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:600;padding:11px 13px;border-bottom:1px solid var(--line);background:#FCFBF7}
  td{padding:12px 13px;border-bottom:1px solid var(--line);font-size:13.5px;vertical-align:top}
  tr:last-child td{border-bottom:0}tr.row:hover{background:#FCFAF4}
  .num{text-align:right;font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums}
  .pill{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:3px 9px;border-radius:999px}
  .st{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:600;padding:3px 10px;border-radius:999px}
  .st.disp{background:var(--green-soft);color:#2E5A3B}.st.campo{background:var(--gold-soft);color:#7A4E0C}.st.manut{background:var(--rust-soft);color:#8A3415}
  .st.aberta{background:var(--gold-soft);color:#7A4E0C}.st.fechada{background:var(--green-soft);color:#2E5A3B}
  .chipset{display:flex;flex-wrap:wrap;gap:5px}
  .chip{font-family:"IBM Plex Mono";font-size:11.5px;font-weight:500;padding:3px 8px;border-radius:7px;background:#F4F1E8;color:#4A463C;border:1px solid var(--line);white-space:nowrap;display:inline-block}
  .chip.tag{background:#FFF;border-color:var(--gold);color:#7A4E0C;font-weight:600}
  .chip.seal{background:var(--green-soft);border-color:#BBD8C2;color:#2E5A3B}
  .age{display:inline-flex;align-items:center;gap:8px}.age .dot{width:9px;height:9px;border-radius:50%}.age .d{font-family:"IBM Plex Mono";font-weight:600}
  .empty{padding:46px 20px;text-align:center;color:var(--muted)}
  .agrow{display:grid;grid-template-columns:64px 1fr;gap:12px;padding:13px 20px;border-bottom:1px solid var(--line);cursor:pointer;transition:background .12s}
  .agrow:last-child{border-bottom:0}
  .agrow:hover{background:#FCFAF4}
  .agtime{font-size:16px;font-weight:600;color:var(--gold);padding-top:1px}
  .agtitle{font-weight:600;font-size:14px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .agsub{color:var(--muted);font-size:12.5px;margin-top:2px}
  .agdetail{max-height:0;overflow:hidden;transition:max-height .2s ease;margin-top:0}
  .agrow.open .agdetail{max-height:240px;margin-top:9px}
  .agrow:not(.open) .agtitle::after{content:"▸";color:var(--line);margin-left:auto;font-size:12px}
  .agrow.open .agtitle::after{content:"▾";color:var(--muted);margin-left:auto;font-size:12px}
  .agbadge{display:inline-block;font-size:9.5px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:2px 6px;border-radius:6px}
  .agbadge.inst{background:var(--gold-soft);color:#7A4E0C}
  .agbadge.rec{background:#EFE6FB;color:#5B3E8A}
  .estack{display:flex;flex-direction:column;gap:12px}
  .esec{border:1px solid var(--line);border-radius:14px;overflow:hidden;background:var(--card)}
  .eseccab{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;cursor:pointer;user-select:none;transition:background .12s}
  .eseccab:hover{background:#FCFAF4}
  .eseccab b{font-size:15px}
  .esecseta{color:var(--gold);font-size:13px;margin-right:4px}
  .esecresumo{font-size:12.5px;color:var(--muted)}
  .eseccorpo{padding:0 20px 12px;border-top:1px solid var(--line)}
  .eseccorpo .head{display:none}
  .eseccorpo .stats{margin-top:16px}
  .empty b{display:block;color:var(--ink);font-family:"Bricolage Grotesque";font-weight:700;font-size:16px;margin-bottom:4px}
  .specs{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted)}
  .specs b{color:var(--ink);font-family:"IBM Plex Mono";font-weight:600}
  .scrim{position:fixed;inset:0;background:rgba(26,32,28,.42);backdrop-filter:blur(2px);display:none;align-items:flex-start;justify-content:center;padding:42px 16px;z-index:50;overflow:auto}
  .scrim.on{display:flex}
  .modal{background:var(--card);border-radius:18px;width:100%;max-width:580px;box-shadow:0 30px 80px -20px rgba(26,32,28,.5);animation:rise .22s ease}
  @keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
  .modal header{padding:20px 24px;border-bottom:1px solid var(--line)}
  .modal header h3{font-size:18px;font-weight:700}.modal header p{margin:4px 0 0;color:var(--muted);font-size:13px}
  .modal .body{padding:20px 24px;display:flex;flex-direction:column;gap:16px;max-height:64vh;overflow:auto}
  .modal footer{padding:16px 24px;border-top:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:10px}
  .modal footer .acerto{font-size:12.5px;color:var(--muted)}
  .modal footer .acerto b{color:var(--ink);font-family:"IBM Plex Mono"}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink);margin-bottom:6px}
  .field input,.field select{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:9px;background:#fff}
  .field input:focus,.field select:focus{outline:2px solid var(--gold-soft);border-color:var(--gold)}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .itemrow{display:grid;grid-template-columns:1.1fr 1fr .6fr auto;gap:8px;align-items:end}
  .itemrow .x{border:1px solid var(--line);background:#fff;border-radius:9px;width:38px;height:38px;color:var(--rust);font-size:16px}
  .addline{background:transparent;border:1px dashed var(--line);border-radius:9px;padding:9px;color:var(--muted);font-weight:600;font-size:12.5px;width:100%}
  .addline:hover{border-color:var(--gold);color:var(--gold)}
  .pick{display:flex;flex-wrap:wrap;gap:8px}
  .pick label{display:flex;align-items:center;gap:7px;border:1px solid var(--line);padding:8px 11px;border-radius:9px;cursor:pointer;font-size:12.5px;font-weight:500}
  .pick label:has(input:checked){border-color:var(--gold);background:var(--gold-soft);color:#7A4E0C}
  .accline{display:grid;grid-template-columns:1.4fr .8fr .8fr;gap:10px;align-items:center;padding:10px 0;border-bottom:1px solid var(--line)}
  .accline:last-child{border-bottom:0}
  .accline .lab{font-weight:600}
  .accline .lab small{display:block;color:var(--muted);font-weight:400;font-size:11.5px}
  .note{font-size:12px;color:var(--muted);background:#FCFBF7;border:1px solid var(--line);border-left:3px solid var(--gold);border-radius:8px;padding:11px 13px;line-height:1.5}
  .toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--cellar);color:#fff;padding:12px 20px;border-radius:11px;font-weight:600;font-size:13.5px;opacity:0;transition:.25s;z-index:80;box-shadow:var(--shadow)}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
  .parque{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px;padding:18px 20px}
  .pq{border:1px solid var(--line);border-radius:11px;padding:13px 14px}
  .pq .m{font-family:"Bricolage Grotesque";font-weight:700;font-size:15px}
  .pq .tot{font-family:"IBM Plex Mono";font-size:22px;font-weight:600;margin:4px 0}
  .pq .br{display:flex;gap:10px;font-size:11px;margin-top:6px;flex-wrap:wrap}
  .pq .br span{display:flex;align-items:center;gap:4px;color:var(--muted)}
  .pq .br i{width:8px;height:8px;border-radius:50%;font-style:normal}
  @media(max-width:860px){.app{grid-template-columns:1fr}.side{position:static;height:auto;flex-direction:row;flex-wrap:wrap;gap:6px}.side .foot,.brand span,.nav .sep{display:none}.nav{flex-direction:row;flex-wrap:wrap}.main{padding:20px}.stats{grid-template-columns:1fr 1fr}.itemrow{grid-template-columns:1fr 1fr}}
</style>

<script>
const mem={};
const store={
  async get(k){try{if(window.storage){const r=await window.storage.get(k);return r?JSON.parse(r.value):null;}}catch(e){}return mem[k]!==undefined?mem[k]:null;},
  async set(k,v){mem[k]=v;try{if(window.storage){await window.storage.set(k,JSON.stringify(v),false);}}catch(e){}}
};

let DB={clientes:[],produtos:[],chopeiras:[],vendas:[],reservas:[],deposito:[],equipamentos:[],cilindros:[]};
const TAMANHOS=[10,15,20,30,50];
const today=()=>new Date();
const iso=d=>new Date(d).toISOString().slice(0,10);
const br=d=>d?d.split('-').reverse().join('/'):'—';
const days=(a,b)=>Math.round((new Date(b)-new Date(a))/86400000);
const fmtR=n=>'R$ '+(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2});
let _vid=1,_cid=1,_rid=1,_eid=1,_clid=1;
function ageColor(d){if(d<=7)return '#3F6B4E';if(d<=14)return '#B8761A';if(d<=21)return '#C66A1E';return '#A8421C';}

  const saved=await store.get('db');
  if(saved){DB=saved;if(!DB.reservas)DB.reservas=[];if(!DB.deposito)DB.deposito=[];if(!DB.equipamentos)DB.equipamentos=[];if(!DB.cilindros)DB.cilindros=[];migrarDiario();migrarEquip();migrarCilindros();_vid=Math.max(1,...DB.vendas.map(v=>v.id),0)+1;_cid=Math.max(1,...DB.chopeiras.map(c=>c.id),0)+1;_rid=Math.max(1,...DB.reservas.map(r=>r.id),0)+1;_eid=Math.max(1,...DB.equipamentos.map(e=>e.id),0)+1;_clid=Math.max(1,...DB.cilindros.map(c=>c.id),0)+1;return;}

    {id:4,estilo:'Vinho',fornecedor:'Importado',custoLitro:9.10,precoLitro:18.00},

  DB.clientes=[
    {id:1,nome:'Bar do Centro',cidade:'Pouso Alegre',tel:'(35) 99100-1010',endereco:'R. Comendador José Garcia, 245',ref:'em frente à praça'},
    {id:2,nome:'Buffet Aurora',cidade:'São Gonçalo',tel:'(35) 99100-2020',endereco:'Av. Brasil, 1200',ref:'galpão azul'},
    {id:3,nome:'Restaurante Pampa',cidade:'Careaçu',tel:'(35) 99100-3030',endereco:'R. das Flores, 88',ref:'ao lado do posto'},
    {id:4,nome:'Espaço Ribeirão (evento)',cidade:'Pouso Alegre',tel:'(35) 99100-4040',endereco:'Estrada do Ribeirão, km 3',ref:'portão branco grande'},
    {id:5,nome:'Boteco do Zé',cidade:'Pouso Alegre',tel:'(35) 99100-5050',endereco:'R. São Bento, 412',ref:'esquina com a farmácia'},

    {id:8,nome:'Rancho do Chopp',cidade:'Careaçu',tel:'(35) 99100-8080',endereco:'Estrada Velha, km 1,5',ref:'fazenda à direita'},

    {id:12,nome:'Sítio Recanto (eventos)',cidade:'Careaçu',tel:'(35) 99101-3333',endereco:'Zona Rural, s/n',ref:'após a ponte'},

// ===== BLOCO DE VENDAS DE TESTE (gerado a pedido — fácil de remover) =====
function gerarVendasTeste(){
  const D=n=>iso(new Date(Date.now()-n*86400000)); // n dias atrás
  const F=n=>iso(new Date(Date.now()+n*86400000)); // n dias à frente
  const pick=a=>a[Math.floor(Math.random()*a.length)];
  const clientes=DB.clientes.map(c=>c.id);
  // fila embaralhada de clientes: cada um sai uma vez antes de repetir (distribuição uniforme)
  let filaCli=[];
  const proxCli=()=>{if(!filaCli.length){filaCli=clientes.slice().sort(()=>Math.random()-0.5);}return filaCli.shift();};
  const prods=DB.produtos.map(p=>p.id);
  const tams=[20,30,50];
  const modelos=['Upper','Slim','Mimo','Cancun'];
  const formas=['Pix','Dinheiro','Cartão','Transferência'];
  let n=0;
  const novaVenda=(cfg)=>{
    const cli=proxCli(), prodId=pick(prods), tam=pick(tams), qtd=cfg.qtd||(1+Math.floor(Math.random()*3));
    const dataEntrega=cfg.entrega;
    const movs=[{tipo:'saida',cat:'barril',tam,prodId,qtd,data:dataEntrega}];
    if(cfg.cilindro){const c=cilDisp()[0];if(c){movs.push({tipo:'saida',cat:'cilindro',equipId:null,cilIds:[c.id],qtd:1,data:dataEntrega});c.status='campo';c.vendaId=_vid;}}
    const v={id:_vid++,clienteId:cli,dataEntrega,horaEntrega:pick(['09:00','10:30','14:00','16:00','18:30']),
      dataRecolhe:cfg.dataRecolhe||null,horaRecolhe:cfg.dataRecolhe?'10:00':null,
      dataRecolhimento:null,status:'aberta',valor:null,
      pago:false,dataPagamento:null,forma:null,vencimento:cfg.vencimento||null,
      chopeiraModelo:pick(modelos),itens:[{cat:'barril',tam,prodId,qtd}],chopeiraIds:[],movs};
    // vincula uma chopeira física disponível (enquanto houver no parque) — só pra vendas que ficam em campo
    if(!cfg.recolhido){
      const livre=DB.chopeiras.find(c=>c.status==='disponivel');
      if(livre){livre.status='campo';livre.vendaId=v.id;v.chopeiraIds=[livre.id];v.chopeiraModelo=livre.modelo;}
    }
    // aplica estados conforme cenário
    if(cfg.recolhido){
      // devolve tudo (vazio = consumido)
      movs.push({tipo:'retorno',cat:'barril',tam,prodId,qtd,data:cfg.recolhidoEm||dataEntrega,estado:'vazio'});
      v.dataRecolhimento=cfg.recolhidoEm||dataEntrega;recalcStatusVenda(v);
    }
    if(cfg.pago){v.pago=true;v.dataPagamento=cfg.pagoEm||dataEntrega;v.forma=pick(formas);}
    DB.vendas.push(v);n++;return v;
  };

  // --- CENÁRIOS VARIADOS ---
  // 1) Em campo recentes (verde) — entregues nos últimos dias, nada pago
  for(let i=0;i<4;i++)novaVenda({entrega:D(1+i),cilindro:i%2===0});
  // 2) Em campo parados há tempo (amarelo→vermelho conforme envelhece)
  novaVenda({entrega:D(9)});
  novaVenda({entrega:D(14)});
  novaVenda({entrega:D(22),cilindro:true});
  novaVenda({entrega:D(31)}); // bem vermelho
  // 3) Recolhidas E pagas (concluídas) — várias, pra encher o financeiro
  for(let i=0;i<6;i++)novaVenda({entrega:D(20+i*3),recolhido:true,recolhidoEm:D(15+i*3),pago:true,pagoEm:D(14+i*3)});
  // 4) Recolhidas mas NÃO pagas (a receber, vasilhame já voltou)
  novaVenda({entrega:D(12),recolhido:true,recolhidoEm:D(8),vencimento:D(2)}); // vencido
  novaVenda({entrega:D(10),recolhido:true,recolhidoEm:D(6),vencimento:F(5)}); // a vencer
  novaVenda({entrega:D(18),recolhido:true,recolhidoEm:D(13),vencimento:D(6)}); // vencido
  // 5) Pagas adiantado mas AINDA em campo (pago, falta recolher)
  novaVenda({entrega:D(5),pago:true,pagoEm:D(5)});
  novaVenda({entrega:D(7),pago:true,pagoEm:D(6),cilindro:true});
  // 6) Instalações FUTURAS agendadas (pra Semana)
  novaVenda({entrega:F(1)});
  novaVenda({entrega:F(2),dataRecolhe:F(4)});
  novaVenda({entrega:F(3)});
  novaVenda({entrega:F(5),dataRecolhe:F(7)});
  // 7) Recolhimento agendado (em campo, com data de busca marcada)
  novaVenda({entrega:D(3),dataRecolhe:F(1)});
  novaVenda({entrega:D(6),dataRecolhe:F(2),cilindro:true});
  // 8) Evento grande (muito barril)
  novaVenda({entrega:D(2),qtd:8,cilindro:true});
  // 9) Vencidos antigos não pagos (pressão no financeiro)
  novaVenda({entrega:D(40),recolhido:true,recolhidoEm:D(35),vencimento:D(25)});
  novaVenda({entrega:D(28),recolhido:true,recolhidoEm:D(24),vencimento:D(18)});
}

// Cilindro vira UNIDADE INDIVIDUAL: {id, etiqueta, capacidade, tara, cargaAtual, status, vendaId, pesagens:[]}
// carga = gás em kg dentro do cilindro. Limite de reabastecimento: < 1kg.
function migrarCilindros(){
  if(DB.cilindros.length)return; // já migrado
  const tipos=DB.equipamentos.filter(e=>e.classe==='cilindro');
  if(!tipos.length)return;
  let n=1;const unidadesPorTipo={};
  tipos.forEach(t=>{
    unidadesPorTipo[t.id]=[];
    const cap=parseFloat(t.nome)||5;
    const tara=cap*1.6+3;
    for(let i=0;i<t.total;i++){
      const cil={id:_clid++,etiqueta:'CIL-'+String(n++).padStart(3,'0'),capacidade:cap,tara:+tara.toFixed(1),cargaAtual:cap,status:'disponivel',vendaId:null,pesagens:[]};
      DB.cilindros.push(cil);unidadesPorTipo[t.id].push(cil);
    }
  });
  DB.vendas.forEach(v=>{(v.movs||[]).forEach(m=>{
    if(m.cat==='equip'){const e=DB.equipamentos.find(x=>x.id===m.equipId);
      if(e&&e.classe==='cilindro'){
        m.cat='cilindro';delete m.equipId;
        const pool=unidadesPorTipo[e.id]||[];
        const livres=pool.filter(c=>c.status==='disponivel');
        const usar=livres.slice(0,m.qtd);
        m.cilIds=usar.map(c=>c.id);
        if(m.tipo==='saida'&&v.status==='aberta')usar.forEach(c=>{c.status='campo';c.vendaId=v.id;});
      }
    }
  });});
  DB.equipamentos=DB.equipamentos.filter(e=>e.classe!=='cilindro');
}

// Migração: vendas no formato antigo (itens fixos + lacrada) ganham um diário equivalente.
// Catálogo de equipamentos (cilindro/manômetro) por tipo, controle por quantidade.
// equip: {id, classe:'cilindro'|'manometro', nome, total} — total = patrimônio cadastrado
// No diário da venda, equipamento sai/volta como mov {cat:'equip', equipId, qtd}
function migrarEquip(){
  // garante catálogo mínimo
  if(!DB.equipamentos.length){
    DB.equipamentos=[
      {id:_eid++,classe:'cilindro',nome:'5 kg',total:0},
      {id:_eid++,classe:'cilindro',nome:'10 kg',total:0},
      {id:_eid++,classe:'manometro',nome:'1 via',total:0},
      {id:_eid++,classe:'manometro',nome:'2 vias',total:0},
      {id:_eid++,classe:'manometro',nome:'3 vias',total:0},
    ];
  }
  // converte movs antigos de cilindro (cat:'cilindro', sem equipId) para o tipo padrão de cilindro
  const cil5=DB.equipamentos.find(e=>e.classe==='cilindro');
  DB.vendas.forEach(v=>{(v.movs||[]).forEach(m=>{
    if(m.cat==='cilindro'&&!m.equipId&&cil5){m.cat='equip';m.equipId=cil5.id;}
  });});
}

function migrarDiario(){
  DB.vendas.forEach(v=>{
    if(v.movs)return; // já migrada
    const movs=[];
    (v.itens||[]).forEach(i=>{
      movs.push({tipo:'saida',cat:i.cat,tam:i.tam,prodId:i.prodId,qtd:i.qtd,data:v.dataEntrega});
    });
    if(v.status==='fechada'){
      // reconstrói os retornos: lacrados como 'lacrado', o resto como 'vazio' (consumido)
      (v.itens||[]).forEach(i=>{
        if(i.cat==='barril'){
          const lac=i.lacrada||0;
          if(lac>0)movs.push({tipo:'retorno',cat:'barril',tam:i.tam,prodId:i.prodId,qtd:lac,data:v.dataRecolhimento,estado:'lacrado'});
          const vaz=i.qtd-lac;
          if(vaz>0)movs.push({tipo:'retorno',cat:'barril',tam:i.tam,prodId:i.prodId,qtd:vaz,data:v.dataRecolhimento,estado:'vazio'});
        }else{
          movs.push({tipo:'retorno',cat:i.cat,qtd:i.qtd,data:v.dataRecolhimento,estado:'vazio'});
        }
      });
    }
    v.movs=movs;
  });
}

// ===== DIÁRIO DE MOVIMENTAÇÕES (fonte de verdade dentro da venda) =====
// Cada mov: {tipo:'saida'|'retorno', cat:'barril'|'cilindro', tam, prodId, qtd, data,
//            estado:'lacrado'|'vazio'|'defeito' (só em retorno)}
// Chopeiras seguem como unidades próprias (venda.chopeiraIds), não entram no diário de barril/cilindro.
function diario(v){return v.movs||[];}
// quantidade em campo por (cat,tam): Σ saída − Σ retorno
function emCampoVenda(v,cat,tam){
  return diario(v).filter(m=>m.cat===cat&&(cat!=='barril'||m.tam===tam)).reduce((s,m)=>s+(m.tipo==='saida'?m.qtd:-m.qtd),0);
}
// agrupa o que está em campo nesta venda: [{cat,tam,prodId,qtd,desde}]
function emCampoItens(v){
  const grupos={};
  diario(v).forEach(m=>{const k=m.cat+'|'+(m.tam||'')+'|'+(m.prodId||'');grupos[k]=grupos[k]||{cat:m.cat,tam:m.tam,prodId:m.prodId,qtd:0,desde:m.data};grupos[k].qtd+=(m.tipo==='saida'?m.qtd:-m.qtd);if(m.tipo==='saida'&&m.data<grupos[k].desde)grupos[k].desde=m.data;});
  return Object.values(grupos).filter(g=>g.qtd>0);
}
function vendaTemAtivoEmCampo(v){return emCampoItens(v).length>0;}
function recalcStatusVenda(v){
  // venda fecha quando nada (barril nem cilindro nem chopeira) está em campo
  const chopFora=v.chopeiraIds.some(id=>{const c=DB.chopeiras.find(x=>x.id===id);return c&&c.status==='campo'&&c.vendaId===v.id;});
  if(!vendaTemAtivoEmCampo(v)&&!chopFora){if(v.status!=='fechada'){v.status='fechada';if(!v.dataRecolhimento)v.dataRecolhimento=iso(today());}}
  else v.status='aberta';
}
// consumido = Σ saída(barril) − Σ retorno lacrado − Σ retorno defeito  (vazio conta como consumido)
function consumidoVenda(v){
  const saida=diario(v).filter(m=>m.tipo==='saida'&&m.cat==='barril');
  const retNaoConsome=diario(v).filter(m=>m.tipo==='retorno'&&m.cat==='barril'&&(m.estado==='lacrado'||m.estado==='defeito'));
  // por litro, usando tam de cada mov
  const litrosSaida=saida.reduce((s,m)=>s+m.qtd*m.tam,0);
  const litrosNaoConsome=retNaoConsome.reduce((s,m)=>s+m.qtd*m.tam,0);
  return {litros:litrosSaida-litrosNaoConsome,saida,retNaoConsome};
}
function valorSugerido(v){
  // soma por produto: (litros saída − litros não-consumidos do mesmo produto) × preço
  const porProd={};
  diario(v).filter(m=>m.cat==='barril').forEach(m=>{const sign=m.tipo==='saida'?1:(m.estado==='lacrado'||m.estado==='defeito'?-1:0);if(sign===0)return;porProd[m.prodId]=(porProd[m.prodId]||0)+sign*m.qtd*m.tam;});
  return Object.entries(porProd).reduce((s,[pid,litros])=>{const p=prod(+pid);return s+(p?Math.max(0,litros)*p.precoLitro:0);},0);
}
function custoVenda(v){
  const porProd={};
  diario(v).filter(m=>m.cat==='barril').forEach(m=>{const sign=m.tipo==='saida'?1:(m.estado==='lacrado'||m.estado==='defeito'?-1:0);if(sign===0)return;porProd[m.prodId]=(porProd[m.prodId]||0)+sign*m.qtd*m.tam;});
  return Object.entries(porProd).reduce((s,[pid,litros])=>{const p=prod(+pid);return s+(p?Math.max(0,litros)*p.custoLitro:0);},0);
}
// barris perdidos por defeito (KPI)
function barrisDefeito(v){return diario(v).filter(m=>m.tipo==='retorno'&&m.cat==='barril'&&m.estado==='defeito').reduce((s,m)=>s+m.qtd,0);}
function barrisEmCampo(){return vendasAbertas().reduce((s,v)=>s+emCampoItens(v).filter(g=>g.cat==='barril').reduce((a,g)=>a+g.qtd,0),0);}

// ===== ESTOQUE DO DEPÓSITO (derivado) =====
// DB.deposito: diário de movimentos do depósito.
//   {tipo:'abertura', tam, cheio, vazio, campo, data}   -> foto inicial por tamanho
//   {tipo:'troca', tam, n, data}                        -> dia da fábrica: devolve n vazios, recebe n cheios (1:1)
//   {tipo:'ajuste', tam, estado:'disponivel'|'vazio'|'campo', delta, data, motivo}
// Três estados que CONSERVAM o total: disponivel (cheio/vendável, inclui lacrados que voltaram), campo, vazio.
// Invariante: disponivel + campo + vazio = total cadastrado.
function barrisEmCampoTam(tam){
  return vendasAbertas().reduce((s,v)=>s+emCampoItens(v).filter(g=>g.cat==='barril'&&g.tam===tam).reduce((a,g)=>a+g.qtd,0),0);
}
function retornosTam(tam,estado){
  return DB.vendas.reduce((s,v)=>s+diario(v).filter(m=>m.tipo==='retorno'&&m.cat==='barril'&&m.tam===tam&&m.estado===estado).reduce((a,m)=>a+m.qtd,0),0);
}
function saidasTam(tam){
  return DB.vendas.reduce((s,v)=>s+diario(v).filter(m=>m.tipo==='saida'&&m.cat==='barril'&&m.tam===tam).reduce((a,m)=>a+m.qtd,0),0);
}
function depMovs(tam){return DB.deposito.filter(m=>m.tam===tam);}
function temAbertura(){return DB.deposito.some(m=>m.tipo==='abertura');}
function estoqueTam(tam){
  const ab={cheio:0,vazio:0,campo:0};
  DB.deposito.filter(m=>m.tipo==='abertura'&&m.tam===tam).forEach(m=>{ab.cheio+=m.cheio||0;ab.vazio+=m.vazio||0;ab.campo+=m.campo||0;});
  const trocaN=DB.deposito.filter(m=>m.tipo==='troca'&&m.tam===tam).reduce((s,m)=>s+(m.n||0),0);
  const aj=(estado)=>DB.deposito.filter(m=>m.tipo==='ajuste'&&m.tam===tam&&m.estado===estado).reduce((s,m)=>s+(m.delta||0),0);
  const S=saidasTam(tam), RL=retornosTam(tam,'lacrado'), RV=retornosTam(tam,'vazio'), RD=retornosTam(tam,'defeito');
  // disponivel: começa com cheio0, sai em cada SAIDA, volta em cada retorno lacrado, +cheios da troca
  const disponivel=ab.cheio - S + RL + trocaN + aj('disponivel');
  // campo: começa com campo0, +cada saída, −cada retorno (qualquer estado)
  const campo=ab.campo + S - (RL+RV+RD) + aj('campo');
  // vazio: começa com vazio0, +retornos vazio e defeito, −vazios da troca
  const vazio=ab.vazio + RV + RD - trocaN + aj('vazio');
  const total=disponivel+campo+vazio;
  return {tam,disponivel,campo,vazio,total};
}
function estoqueTodos(){return TAMANHOS.map(estoqueTam).filter(e=>e.total!==0||depMovs(e.tam).length);}

function litrosItem(i){return i.cat==='barril'?i.tam*i.qtd:0;}
function litrosReserva(r){return r.itens.reduce((s,i)=>s+litrosItem(i),0);}
function reservasFuturas(){return DB.reservas.filter(r=>r.status==='reservada').sort((a,b)=>new Date(a.dataEvento)-new Date(b.dataEvento));}
function reservaChopeira(chId){return reservasFuturas().find(r=>r.chopeiraIds.includes(chId));}

function chopeirasEmConflito(chIds,ignorarReservaId){
  return chIds.filter(id=>reservasFuturas().some(r=>r.id!==ignorarReservaId&&r.chopeiraIds.includes(id)));
}

function chopeiraVendaChip(v){
  if(v.chopeiraIds&&v.chopeiraIds.length)return v.chopeiraIds.map(id=>{const c=DB.chopeiras.find(x=>x.id===id);return c?`<span class="chip tag">${c.etiqueta} · ${c.modelo}</span>`:'';}).join(' ');
  if(v.chopeiraModelo)return `<span class="chip tag" style="opacity:.75">${v.chopeiraModelo} (a definir)</span>`;
  return '';
}
function semanaInicio(d){const x=new Date(d);const dow=(x.getDay()+6)%7;x.setDate(x.getDate()-dow);x.setHours(0,0,0,0);return x;}
function semanaLabel(d){const i=semanaInicio(d);const f=new Date(i);f.setDate(f.getDate()+6);const fmt=z=>('0'+z.getDate()).slice(-2)+'/'+('0'+(z.getMonth()+1)).slice(-2);return fmt(i)+' a '+fmt(f);}
// média semanal de litros consumidos (vendas fechadas das últimas ~8 semanas), por produto
function consumoSemanalMedio(){
  const fechadas=DB.vendas.filter(v=>v.status==='fechada'&&v.dataRecolhimento);
  if(!fechadas.length)return {total:0,porProd:{}};
  const datas=fechadas.map(v=>new Date(v.dataRecolhimento));
  const min=new Date(Math.min(...datas)),max=new Date(Math.max(...datas));
  const semanas=Math.max(1,Math.ceil((max-min)/(7*86400000))+1);
  const porProd={};let total=0;
  fechadas.forEach(v=>diario(v).filter(m=>m.cat==='barril').forEach(m=>{const sign=m.tipo==='saida'?1:(m.estado==='lacrado'||m.estado==='defeito'?-1:0);if(!sign)return;const l=sign*m.qtd*m.tam;total+=l;const p=prod(m.prodId);const key=p?p.estilo+' · '+p.fornecedor:'—';porProd[key]=(porProd[key]||0)+l;}));
  Object.keys(porProd).forEach(k=>porProd[k]=porProd[k]/semanas);
  return {total:total/semanas,porProd,semanas};
}
// litros reservados por semana (próximas N semanas) e por produto
function reservasPorSemana(nSemanas){
  const hojeIni=semanaInicio(today());const out=[];
  for(let w=0;w<nSemanas;w++){
    const ini=new Date(hojeIni);ini.setDate(ini.getDate()+w*7);const fim=new Date(ini);fim.setDate(fim.getDate()+7);
    const rs=reservasFuturas().filter(r=>{const d=new Date(r.dataEvento);return d>=ini&&d<fim;});
    const porProd={};let litros=0;
    rs.forEach(r=>r.itens.filter(i=>i.cat==='barril').forEach(i=>{const l=litrosItem(i);litros+=l;const p=prod(i.prodId);const key=p?p.estilo+' · '+p.fornecedor:'—';porProd[key]=(porProd[key]||0)+l;}));
    out.push({ini:iso(ini),label:semanaLabel(ini),litros,porProd,reservas:rs});
  }
  return out;
}
// AGENDADO por tamanho de barril, na janela [hoje, hoje+dias]: instalações marcadas + reservas
function agendadoPorTam(dias){
  const ini=iso(today());const fimD=new Date(Date.now()+dias*86400000);const fim=iso(fimD);
  const porTam={};TAMANHOS.forEach(t=>porTam[t]=0);
  // instalações agendadas (vendas abertas com entrega na janela) — conta os barris que vão sair
  DB.vendas.filter(v=>v.status==='aberta'&&v.dataEntrega>=ini&&v.dataEntrega<=fim).forEach(v=>{
    (v.itens||[]).filter(i=>i.cat==='barril').forEach(i=>{porTam[i.tam]=(porTam[i.tam]||0)+i.qtd;});
  });
  // reservas (eventos futuros) na janela
  reservasFuturas().filter(r=>r.dataEvento>=ini&&r.dataEvento<=fim).forEach(r=>{
    (r.itens||[]).filter(i=>i.cat==='barril').forEach(i=>{porTam[i.tam]=(porTam[i.tam]||0)+(i.qtd||0);});
  });
  return porTam;
}

  // cilindros individuais em campo
  cilEmCampoVenda(v).forEach(c=>chips.push(`<span class="chip" style="background:#EAF1FB;border-color:#BcD3EF;color:#2C5A92">⛽ ${c.etiqueta}</span>`));

let semanaDia='todos';let semanaFiltro='tudo'; // tudo | instalar | hoje | semdata | unidade
function renderAgenda(){
  const hojeIso=iso(today());
  const F=semanaFiltro;
  const soInstalar=F==='instalar'||F==='unidade'; // esses filtros mostram só instalações
  // vendas com unidade pendente (modelo definido, sem etiqueta)
  const pendUnidade=v=>v.status==='aberta'&&v.dataEntrega>=hojeIso&&!v.chopeiraIds.length&&v.chopeiraModelo;
  // eventos da semana: instalações (entrega futura) + recolhimentos agendados (dataRecolhe futura)
  const eventos=[];
  DB.vendas.filter(v=>v.status==='aberta').forEach(v=>{
    if(v.dataEntrega>=hojeIso){
      if(F==='unidade'&&!pendUnidade(v))return; // só pendentes de etiqueta
      eventos.push({tipo:'instalar',v,dia:v.dataEntrega,hora:v.horaEntrega||''});
    }
    if(v.dataRecolhe&&v.dataRecolhe>=hojeIso&&!soInstalar)eventos.push({tipo:'recolher',v,dia:v.dataRecolhe,hora:v.horaRecolhe||''});
  });
  // filtro "Hoje": só eventos de hoje
  let eventosF=F==='hoje'?eventos.filter(e=>e.dia===hojeIso):eventos;
  const porDia={};
  eventosF.forEach(e=>{(porDia[e.dia]=porDia[e.dia]||[]).push(e);});
  let dias=Object.keys(porDia).sort();
  const diasTodos=dias.slice();
  if(semanaDia!=='todos')dias=dias.filter(d=>d===semanaDia);
  const detalhado=semanaDia!=='todos'; // dia escolhido -> linhas já abertas pro time
  // recolhimentos SEM data marcada (vasilhame fora, ninguém agendou ainda)
  const semDataTodos=vendasAbertas().filter(v=>(vendaTemAtivoEmCampo(v)||v.chopeiraIds.some(id=>{const c=DB.chopeiras.find(x=>x.id===id);return c&&c.status==='campo'&&c.vendaId===v.id;}))&&!(v.dataRecolhe&&v.dataRecolhe>=hojeIso))
    .sort((a,b)=>new Date(a.dataEntrega)-new Date(b.dataEntrega));
  // o bloco "sem data" aparece em 'tudo' e 'semdata'; some nos filtros de instalação e hoje

  const instHoje=eventos.filter(e=>e.tipo==='instalar'&&e.dia===hojeIso).length;
  const recHoje=eventos.filter(e=>e.tipo==='recolher'&&e.dia===hojeIso).length;
  const semUnid=DB.vendas.filter(pendUnidade).length;
  const instFuturas=DB.vendas.filter(v=>v.status==='aberta'&&v.dataEntrega>=hojeIso).length;

  const cardSel=(val,titulo,valorHtml,sub,cor)=>{const on=F===val;
    return `<div class="stat" style="cursor:pointer;${on?'outline:2px solid '+(cor||'var(--gold)')+';outline-offset:-1px':''}" onclick="semanaFiltro=(semanaFiltro==='${val}'?'tudo':'${val}');render()"><div class="k">${titulo}</div><div class="v mono"${cor?` style="color:${cor}"`:''}>${valorHtml}</div><div class="sub">${on?'filtrando ✓':sub}</div></div>`;};
  const resumo=`<div class="stats" style="grid-template-columns:repeat(4,1fr)">
      ${cardSel('instalar','Instalações',instFuturas,'a fazer — clique p/ ver só','var(--gold)')}

        <div class="agsub">${(()=>{const ev=endVenda(v);return ev.alt?'<span style="color:var(--gold)">📍 entrega alternativa</span>':c.cidade||'';})()}${endVenda(v).ref?' · '+endVenda(v).ref:''}</div>
        <div class="agdetail">
          <div style="color:var(--muted);font-size:12.5px">📍 ${endVenda(v).end||'sem endereço'}${endVenda(v).alt?' <span style="color:var(--gold);font-weight:600">(alternativo)</span>':''}${c.tel?' · 📞 '+c.tel:''}</div>

  const linhaRecolher=(v)=>{const c=cliente(v.clienteId)||{};
    const oque=emCampoItens(v).map(g=>g.cat==='cilindro'?g.qtd+'× cilindro':g.qtd+'× '+g.tam+'L').join(' · ');

        </div>
      </div></div>`;};

  let blocos='';

  const hojeTemEvento=(porDia[hojeIso]||[]).length>0;
  const avisoHoje=(!hojeTemEvento&&(F==='tudo'||F==='hoje')&&semanaDia==='todos')

    const tag=[nInst?nInst+' instalar':'',nRec?nRec+' recolher':''].filter(Boolean).join(' · ');
    const linhas=lista.map(e=>e.tipo==='instalar'?linhaInstalar(e.v):linhaRecolher(e.v)).join('');
    blocos+=`<div class="panel"><h2${ehHoje?' style="background:var(--gold-soft)"':''}>${ehHoje?'Hoje · ':''}${br(dia)} <span style="font-weight:400;color:var(--muted)">${diaSemana(dia)}</span> <span class="tag">${tag}</span></h2>${linhas}</div>`;
  });}

  // seletor de dia (chips)
  const diaChip=(val,lab)=>`<button class="btn ${semanaDia===val?'primary':'ghost'} sm" onclick="semanaDia='${val}';render()">${lab}</button>`;
  // chips de dia só fazem sentido quando a tela é organizada por dia (tudo / instalar / unidade)
  const usaDias=(F==='tudo'||F==='instalar'||F==='unidade');

  view.innerHTML=headHTML('Logística','Semana de trabalho','O que instalar e o que recolher, por dia e por hora. Os cards no topo filtram; o filtro de dia se combina por cima. Hoje fica no topo.','')+resumo+

}

let vendaFiltro='aberto';let vendaOrdem='critico'; // critico | asc | desc
function vendaCritica(v){
  // crítico = vasilhame parado +20d OU pagamento vencido
  const parado=v.status==='aberta'&&days(v.dataEntrega,today())>20;
  return parado||vencido(v);
}
function renderVendas(){
  let vs=DB.vendas.slice();
  // ordenação: 'critico' = mais antigo em campo / mais urgente no topo
  if(vendaOrdem==='critico'){
    vs.sort((a,b)=>{
      const da=a.status==='aberta'?days(a.dataEntrega,today()):-1;
      const db=b.status==='aberta'?days(b.dataEntrega,today()):-1;
      if(da!==db)return db-da; // mais dias em campo primeiro
      return new Date(b.dataEntrega)-new Date(a.dataEntrega);
    });
  }else{
    const dir=vendaOrdem==='asc'?1:-1;
    vs.sort((a,b)=>dir*(new Date(a.dataEntrega)-new Date(b.dataEntrega)));
  }
  if(vendaFiltro==='aberto')vs=vs.filter(v=>v.status==='aberta'||!v.pago);
  else if(vendaFiltro==='concluidas')vs=vs.filter(v=>v.status==='fechada'&&v.pago);
  else if(vendaFiltro==='criticos')vs=vs.filter(vendaCritica);
  const total=DB.vendas.length;
  const nAberto=DB.vendas.filter(v=>v.status==='aberta'||!v.pago).length;
  const nCriticos=DB.vendas.filter(vendaCritica).length;
  const tagVas=v=>v.status==='aberta'
    ? `<span class="chip" style="background:var(--gold-soft);border-color:#E6D2A8;color:#8A5A00">📍 em campo</span>`
    : `<span class="chip" style="background:#E8F2EA;border-color:#BcDcC4;color:#2C6B3F">✓ recolhido</span>`;
  const tagPag=v=>v.pago
    ? `<span class="chip" style="background:#E8F2EA;border-color:#BcDcC4;color:#2C6B3F">✓ pago</span>`
    : vencido(v)
      ? `<span class="chip" style="background:var(--rust-soft);border-color:#E0A892;color:#8A3415;font-weight:600">⚠ vencido</span>`
      : `<span class="chip" style="background:#FBF4E6;border-color:#E6D2A8;color:#8A5A00">a receber</span>`;
  const rows=vs.map(v=>{
    const dEm=v.status==='aberta'?days(v.dataEntrega,today()):null;
    const val=valorVenda(v);
    const crit=vendaCritica(v);
    return `<tr class="row" style="${crit?'background:#FBEAE2;box-shadow:inset 4px 0 0 var(--rust)':''}">
      <td><div style="font-weight:600">${clienteNome(v.clienteId)}${crit?' <span style="color:var(--rust);font-size:11px">⚠ crítico</span>':''}</div><div class="chipset" style="margin-top:5px;display:flex;flex-wrap:wrap;gap:4px">${itensChips(v)}${chopeiraVendaChip(v)}</div></td>
      <td style="white-space:nowrap;min-width:118px">${tagVas(v)}</td>
      <td style="white-space:nowrap;min-width:118px">${tagPag(v)}</td>
      <td class="mono" style="white-space:nowrap">${br(v.dataEntrega)}${v.horaEntrega?' <span style="color:var(--gold);font-weight:600">'+v.horaEntrega+'</span>':''}</td>
      <td class="mono" style="white-space:nowrap">${v.status==='fechada'?br(v.dataRecolhimento):`<span style="color:${ageColor(dEm)};font-weight:${dEm>20?'700':'400'}">há ${dEm}d</span>`}</td>
      <td class="num" style="font-weight:600">${fmtR(val)}</td>
      <td style="text-align:right;white-space:nowrap">${v.status==='aberta'?`<button class="btn ghost sm" onclick="openRepor(${v.id})">Repor</button> <button class="btn primary sm" onclick="openRecolhimento(${v.id})">Recolher</button> `:''}${!v.pago?`<button class="btn gold sm" onclick="openPagamento(${v.id})">Receber</button>`:''}</td></tr>`;
  }).join('')||`<tr><td colspan="7"><div class="empty"><b>${vendaFiltro==='criticos'?'Nada crítico 🎉':'Nenhuma venda'}</b>${vendaFiltro==='criticos'?'Nenhum barril parado +20 dias nem pagamento vencido.':'Crie a primeira venda.'}</div></td></tr>`;
  const ordemLabel={critico:'Mais urgente',asc:'Entrega ▲',desc:'Entrega ▼'}[vendaOrdem];
  view.innerHTML=headHTML('A base','Vendas','Cada venda é o registro completo: o que foi entregue, quando, o que voltou lacrado no recolhimento, o que foi consumido e o valor. É a unidade que amarra tudo.',
    `<button class="btn gold" onclick="openVenda()">+ Nova venda</button>`)+
    `<div class="stats" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat"><div class="k">Em campo (previsto)</div><div class="v mono" style="font-size:22px">${fmtR(receitaPrevista())}</div><div class="sub">vendas abertas, valor estimado</div></div>
      <div class="stat"><div class="k">Receita acertada</div><div class="v mono" style="font-size:22px;color:var(--green-ok)">${fmtR(receitaRealizada())}</div><div class="sub">vendas já recolhidas</div></div>
      <div class="stat" style="${nCriticos&&vendaFiltro==='criticos'?'outline:2px solid var(--rust);outline-offset:-1px':''}"><div class="k">Críticos</div><div class="v mono" style="color:${nCriticos?'var(--rust)':'var(--green-ok)'}">${nCriticos}</div><div class="sub">parado +20d ou vencido</div></div>
    </div>
    <div class="panel"><h2>Vendas <span style="display:flex;align-items:center;gap:8px;font-weight:400;color:var(--muted);font-size:13px">Mostrar:<select onchange="vendaFiltro=this.value;render()" style="padding:6px 10px;border:1px solid var(--line);border-radius:8px;font-weight:600;color:var(--ink)"><option value="aberto" ${vendaFiltro==='aberto'?'selected':''}>Em aberto — falta recolher ou receber (${nAberto})</option><option value="criticos" ${vendaFiltro==='criticos'?'selected':''}>Atrasados / Críticos (${nCriticos})</option><option value="concluidas" ${vendaFiltro==='concluidas'?'selected':''}>Concluídas — recolhidas e pagas</option><option value="todas" ${vendaFiltro==='todas'?'selected':''}>Todas (${total})</option></select></span></h2>
      <table><thead><tr><th>Cliente / itens</th><th>Vasilhame</th><th>Pagamento</th><th style="cursor:pointer;user-select:none" onclick="vendaOrdem=(vendaOrdem==='critico'?'asc':vendaOrdem==='asc'?'desc':'critico');render()" title="Clique para mudar a ordenação">${ordemLabel} <span style="color:var(--gold)">⇅</span></th><th>Recolhimento</th><th class="num">Valor</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="note">Ordenado por <b>mais urgente</b> (parado há mais tempo no topo). As tags mostram o estado do <b>vasilhame</b> e do <b>pagamento</b> de relance. <b>Crítico</b> = barril parado +20 dias ou pagamento vencido.</div>`;
}

let pendFoco='tudo'; // tudo | recolher | receber | vencidos
function renderPendencias(){
  const recolher=aRecolherLista(), receber=aReceberLista();
  const totalRec=totalAReceber();
  const vencidos=receber.filter(vencido);
  const f=pendFoco;
  // agrupa A recolher por cliente (tudo que está com cada um)
  const porCliente={};
  recolher.forEach(v=>{(porCliente[v.clienteId]=porCliente[v.clienteId]||[]).push(v);});
  const clientesRec=Object.keys(porCliente).sort((a,b)=>{
    const da=Math.max(...porCliente[a].map(v=>days(v.dataEntrega,today())));
    const db=Math.max(...porCliente[b].map(v=>days(v.dataEntrega,today())));
    return db-da; // mais antigo primeiro
  });
  const recRows=clientesRec.map(cid=>{
    const vendas=porCliente[cid];
    const diaMax=Math.max(...vendas.map(v=>days(v.dataEntrega,today())));
    const chips=vendas.map(v=>emCampoChipsCompleto(v)).join(' ');
    const botoes=vendas.length===1
      ? `<button class="btn primary sm" onclick="openRecolhimento(${vendas[0].id})">Recolher</button>`
      : vendas.map(v=>`<button class="btn primary sm" onclick="openRecolhimento(${v.id})" style="margin-bottom:4px">Recolher ${br(v.dataEntrega)}</button>`).join('<br>');
    return `<tr class="row"><td><div style="font-weight:600">${clienteNome(+cid)}</div><div class="chipset" style="margin-top:5px">${chips||'<span style="color:var(--muted);font-size:12px">sem itens em campo</span>'}</div>${vendas.length>1?`<div style="font-size:11.5px;color:var(--muted);margin-top:4px">${vendas.length} vendas em aberto</div>`:''}</td>
      <td class="mono">${vendas.map(v=>br(v.dataEntrega)).join('<br>')}</td>
      <td><div class="age"><span class="dot" style="background:${ageColor(diaMax)}"></span><span class="d" style="color:${ageColor(diaMax)}">${diaMax}d em campo</span></div></td>
      <td style="text-align:right">${botoes}</td></tr>`;
  }).join('')||`<tr><td colspan="4"><div class="empty"><b>Nada a recolher</b>Nenhum equipamento em campo.</div></td></tr>`;
  const listaReceber=f==='vencidos'?vencidos:receber;
  // agrupa "a receber" por cliente, para permitir quitar todas as pendências de uma vez
  const porCliReceber={};
  listaReceber.forEach(v=>{(porCliReceber[v.clienteId]=porCliReceber[v.clienteId]||[]).push(v);});
  const clientesReceber=Object.keys(porCliReceber).sort((a,b)=>{
    // prioriza quem tem algo recolhido-e-devendo (cobrança), depois por valor
    const ra=porCliReceber[a].some(v=>v.status!=='aberta'),rb=porCliReceber[b].some(v=>v.status!=='aberta');
    if(ra!==rb)return ra?-1:1;
    return porCliReceber[b].reduce((s,v)=>s+valorVenda(v),0)-porCliReceber[a].reduce((s,v)=>s+valorVenda(v),0);
  });
  const recvRows=clientesReceber.map(cid=>{
    const vendas=porCliReceber[cid];
    const recolhidos=vendas.filter(v=>v.status!=='aberta').sort((a,b)=>new Date(a.vencimento||a.dataEntrega)-new Date(b.vencimento||b.dataEntrega));
    const emCampo=vendas.filter(v=>v.status==='aberta').sort((a,b)=>new Date(a.vencimento||a.dataEntrega)-new Date(b.vencimento||b.dataEntrega));
    const totalCli=vendas.reduce((s,v)=>s+valorVenda(v),0);
    const totalCobrar=recolhidos.reduce((s,v)=>s+valorVenda(v),0);
    const mista=recolhidos.length>0&&emCampo.length>0;
    const linhaVenda=(v,grupo)=>{
      const venc=v.vencimento;const atras=vencido(v);
      const cobrar=grupo==='cobrar';
      return `<tr class="row" style="${cobrar?'background:#FBF1EC':''}">
        <td style="padding-left:28px"><span style="color:var(--muted)">└ </span><span style="font-size:12.5px">venda ${br(v.dataEntrega)}</span></td>
        <td class="mono">${venc?`<span style="color:${atras?'var(--rust)':'inherit'};font-weight:${atras?'600':'400'}">${br(venc)}${atras?' ⚠':''}</span>`:'<span style="color:var(--muted)">sem prazo</span>'}</td>
        <td class="num" style="font-weight:600">${fmtR(valorVenda(v))}</td>
        <td style="text-align:right"><button class="btn ${cobrar?'gold':'ghost'} sm" onclick="openPagamento(${v.id})">Pagar</button></td></tr>`;
    };
    // subcabeçalho de grupo dentro do card
    const subCab=(txt,cor,borda)=>`<tr><td colspan="4" style="padding:8px 14px 5px 24px;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:700;color:${cor};${borda?'border-top:2px solid var(--line)':''}">${txt}</td></tr>`;
    // cabeçalho do cliente: total + botões conforme o que tem
    let botoes='';
    if(mista){
      botoes=`<button class="btn primary sm" onclick="quitarCliente(${cid},'recolhidos')">Quitar recolhidos</button> <button class="btn ghost sm" onclick="quitarCliente(${cid},'tudo')" style="margin-left:4px">Quitar tudo</button>`;
    }else if(recolhidos.length>1){
      botoes=`<button class="btn primary sm" onclick="quitarCliente(${cid},'tudo')">Quitar todas</button>`;
    }else if(emCampo.length>1){
      botoes=`<button class="btn ghost sm" onclick="quitarCliente(${cid},'tudo')">Quitar todas</button>`;
    }
    const cabCli=`<tr style="background:#FAF8F3"><td style="font-weight:700">${clienteNome(+cid)}${vendas.length>1?` <span class="tag">${vendas.length} pendências</span>`:''}</td><td></td><td class="num" style="font-weight:700">${fmtR(totalCli)}</td><td style="text-align:right">${botoes}</td></tr>`;
    // monta o corpo: se mista, dois blocos com subcabeçalho; senão, lista simples
    let corpo='';
    if(mista){
      corpo+=subCab(`Cobrar agora — recolhido · ${fmtR(totalCobrar)}`,'#8A3415',false);
      corpo+=recolhidos.map(v=>linhaVenda(v,'cobrar')).join('');
      corpo+=subCab('Acompanhar — ainda em campo','var(--muted)',true);
      corpo+=emCampo.map(v=>linhaVenda(v,'campo')).join('');
    }else{
      const grupo=recolhidos.length?'cobrar':'campo';
      const lista=recolhidos.length?recolhidos:emCampo;
      // rótulo de status quando não é mista (uma linha só ou várias do mesmo tipo)
      if(vendas.length>1)corpo+=subCab(recolhidos.length?'Cobrar agora — recolhido':'Acompanhar — ainda em campo',recolhidos.length?'#8A3415':'var(--muted)',false);
      corpo+=lista.map(v=>linhaVenda(v,grupo)).join('');
    }
    return cabCli+corpo;
  }).join('')||`<tr><td colspan="4"><div class="empty"><b>${f==='vencidos'?'Nenhum vencido':'Nada a receber'}</b>${f==='vencidos'?'Nenhuma venda com prazo estourado.':'Todas as vendas estão pagas.'}</div></td></tr>`;
  // cards clicáveis (3) + monitoramento (2)
  const cardF=(val,titulo,valorHtml,sub,cor)=>{const on=f===val;return `<div class="stat" style="cursor:pointer;${on?'outline:2px solid '+(cor||'var(--gold)')+';outline-offset:-1px':''}" onclick="pendFoco=(pendFoco==='${val}'?'tudo':'${val}');render()"><div class="k">${titulo}</div><div class="v mono"${cor?` style="color:${cor}"`:''}>${valorHtml}</div><div class="sub">${on?'filtrando ✓':sub}</div></div>`;};
  const cardN=(titulo,valorHtml,sub)=>`<div class="stat"><div class="k">${titulo}</div><div class="v mono">${valorHtml}</div><div class="sub">${sub}</div></div>`;
  // visibilidade das listas conforme o foco
  const mostraRecolher=(f==='tudo'||f==='recolher');
  const mostraReceber=(f==='tudo'||f==='receber'||f==='vencidos');
  const blocoRecolher=`<div class="panel"><h2>A recolher <span class="tag">vasilhame ainda em campo</span></h2><table><thead><tr><th>Cliente / o que pegar</th><th>Entregue</th><th>Há</th><th></th></tr></thead><tbody>${recRows}</tbody></table></div>`;
  const blocoReceber=`<div class="panel"><h2>A receber <span class="tag">${f==='vencidos'?'só vencidos':'por vencimento — vencidos no topo'}</span></h2><table><thead><tr><th>Cliente</th><th>Vencimento</th><th class="num">Valor</th><th></th></tr></thead><tbody>${recvRows}</tbody></table></div>`;
  const manoCampo=vendasAbertas().reduce((s,v)=>s+equipEmCampoVenda(v).filter(g=>g.classe==='manometro').reduce((a,g)=>a+g.qtd,0),0);
  const totalEmCampo=barrisEmCampo()+chCampo().length+cilCampo().length+manoCampo;
  view.innerHTML=headHTML('Pendências','Em campo e a receber','O que está fora pra voltar e o dinheiro que ainda tem que entrar. Toque num card para isolar uma lista. São pendências independentes: pode estar pago com o barril em campo, ou recolhido e devendo.','')+
    `<div class="stats" style="grid-template-columns:repeat(4,1fr)">
      ${cardF('recolher','A recolher',recolher.length,'vasilhame em campo')}
      ${cardF('receber','A receber',fmtR(totalRec),receber.length+' em aberto','var(--gold)')}
      ${cardF('vencidos','Vencidos',fmtR(vencidos.reduce((s,v)=>s+valorVenda(v),0)),vencidos.length+' com prazo estourado',vencidos.length?'var(--rust)':'var(--ink)')}
      ${cardN('Equipamentos em campo',totalEmCampo,`${barrisEmCampo()} barris · ${chCampo().length} chop · ${cilCampo().length} cil · ${manoCampo} manôm`)}
    </div>
    ${mostraRecolher?blocoRecolher:''}
    ${mostraReceber?blocoReceber:''}`;
}

    <div class="note">Quando o evento se aproximar, use <b>Virar venda</b> para converter a reserva numa venda real (entrega). A chopeira reservada aparece marcada na aba Chopeiras, mas segue disponível para uso até lá.</div>`;

let pedidoMargem=20; // % de margem sobre o agendado, para o walk-in não agendado
let pedidoDias=7;     // janela de planejamento em dias
function renderPedidoFabrica(){
  const agendado=agendadoPorTam(pedidoDias); // barris por tamanho
  // quantas vendas em campo têm barril de cada tamanho (cada recolhimento vira vazio)
  const vendasComBarrilEmCampo=t=>vendasAbertas().filter(v=>emCampoItens(v).some(g=>g.cat==='barril'&&g.tam===t)).length;
  const barrisEmCampoTam=t=>vendasAbertas().reduce((s,v)=>s+emCampoItens(v).filter(g=>g.cat==='barril'&&g.tam===t).reduce((a,g)=>a+g.qtd,0),0);
  const linhas=TAMANHOS.map(t=>{
    const est=estoqueTam(t);
    const ag=agendado[t]||0;
    const comMargem=Math.ceil(ag*(1+pedidoMargem/100));  // necessidade
    const disp=Math.max(0,est.disponivel);
    const vazios=Math.max(0,est.vazio);
    const faltam=Math.max(0,comMargem-disp);             // o que preciso além do estoque
    const podeTrocar=Math.min(faltam,vazios);             // o que dá pra pedir (limite 1:1)
    // FALTARÁ = necessidade − (estoque + o que consigo trocar) = o que vou DEVER ao cliente
    const faltara=Math.max(0,comMargem-(disp+podeTrocar));
    // causa: se ainda há vazios não usados, o gargalo é estoque; senão é vazio
    const sobramVazios=vazios>podeTrocar;
    const causa=faltara>0?(sobramVazios?'estoque':'vazio'):null;
    return {t,ag,comMargem,disp,vazios,podeTrocar,faltara,causa,emCampo:barrisEmCampoTam(t),nVendas:vendasComBarrilEmCampo(t)};
  }).filter(r=>r.ag>0||r.comMargem>0||r.disp>0||r.vazios>0);

  const algoFaltara=linhas.some(r=>r.faltara>0);
  const totalPedir=linhas.reduce((s,r)=>s+r.podeTrocar,0);
  const totalFaltara=linhas.reduce((s,r)=>s+r.faltara,0);

  const rows=linhas.map(r=>{
    let faltaCel;
    if(r.faltara===0)faltaCel='<span style="color:var(--green-ok)">coberto</span>';
    else if(r.causa==='vazio')faltaCel=`<span style="color:var(--rust);font-weight:600">${r.faltara} ⚠</span><div style="font-size:10.5px;color:var(--muted)">faltam vazios</div>`;
    else faltaCel=`<span style="color:var(--rust);font-weight:600">${r.faltara} ⚠</span><div style="font-size:10.5px;color:var(--muted)">falta estoque</div>`;
    return `<tr class="row">
      <td style="font-weight:600">${r.t}L</td>
      <td class="num">${r.ag}</td>
      <td class="num" style="color:var(--muted)">${r.comMargem}</td>
      <td class="num" style="color:var(--green-ok)">${r.disp}</td>
      <td class="num" style="color:#6B7280">${r.vazios}</td>
      <td class="num" style="font-weight:700;color:var(--gold)">${r.podeTrocar}</td>
      <td class="num">${faltaCel}</td>
    </tr>`;}).join('')||`<tr><td colspan="7"><div class="empty"><b>Nada agendado na janela</b>Agende instalações na Semana ou reservas para o pedido aparecer aqui.</div></td></tr>`;

  // sugestões de recolhimento: para os tamanhos que faltam por falta de vazio, recolher gera vazio
  const sugestoes=linhas.filter(r=>r.faltara>0&&r.causa==='vazio'&&r.nVendas>0).map(r=>{
    const precisa=Math.min(r.faltara,r.nVendas); // cada venda recolhida ≈ 1+ vazios
    return `<li style="margin-bottom:6px">No <b>${r.t}L</b> faltam <b style="color:var(--rust)">${r.faltara}</b> e seus vazios acabaram. Você tem <b>${r.nVendas} venda${r.nVendas>1?'s':''}</b> com ${r.t}L em campo — recolher destrava vazios pra trocar. <a onclick="setView('pendencias')" style="color:var(--gold);cursor:pointer;font-weight:600">Ver o que recolher →</a></li>`;
  }).join('');
  const faltaPorEstoque=linhas.filter(r=>r.faltara>0&&r.causa==='estoque');

  view.innerHTML=headHTML('Abastecimento semanal','Pedido à fábrica','O pedido acompanha o que está agendado na Semana (instalações + reservas), por tamanho. A fábrica troca vazio por cheio 1:1 — então o "Faltará" mostra o que você ainda deverá ao cliente depois de usar estoque e trocar todos os vazios.','')+
    `<div class="stats" style="grid-template-columns:repeat(3,1fr)">
      <div class="stat"><div class="k">A pedir (trocável)</div><div class="v mono" style="color:var(--gold)">${totalPedir}<small> barris</small></div><div class="sub">o que dá pra trocar agora</div></div>
      <div class="stat" style="${algoFaltara?'outline:2px solid var(--rust);outline-offset:-1px':''}"><div class="k">Faltará ao cliente</div><div class="v mono" style="color:${algoFaltara?'var(--rust)':'var(--green-ok)'}">${totalFaltara}<small> barris</small></div><div class="sub">${algoFaltara?'demanda que não será atendida':'tudo coberto'}</div></div>
      <div class="stat"><div class="k">Janela</div><div class="v mono">${pedidoDias}<small> dias</small></div><div class="sub">instalações e reservas</div></div>
    </div>
    <div class="panel">
      <h2>Configuração do cálculo</h2>
      <div style="padding:14px 20px;display:flex;gap:24px;flex-wrap:wrap;align-items:end">
        <div class="field" style="margin:0"><label>Janela (dias)</label><select onchange="pedidoDias=+this.value;render()" style="padding:8px;border:1px solid var(--line);border-radius:8px">${[7,14,21,30].map(d=>`<option value="${d}" ${pedidoDias===d?'selected':''}>${d} dias</option>`).join('')}</select></div>
        <div class="field" style="margin:0"><label>Margem p/ não agendado (%)</label><input type="number" min="0" max="100" value="${pedidoMargem}" onchange="pedidoMargem=Math.max(0,+this.value||0);render()" style="padding:8px;border:1px solid var(--line);border-radius:8px;width:90px"></div>
        <div style="font-size:12.5px;color:var(--muted);flex:1;min-width:200px">A margem cobre as vendas de última hora que você não agenda.</div>
      </div>
    </div>
    ${algoFaltara?`<div class="note" style="border-left-color:var(--rust);margin-bottom:16px;color:#8A3415"><b>Vão faltar ${totalFaltara} barril(s) pro mercado.</b> Mesmo usando todo o estoque e trocando todos os vazios possíveis, a demanda agendada supera o que você consegue ter. Veja a causa por tamanho na coluna "Faltará".</div>`:''}
    ${sugestoes?`<div class="panel" style="border-color:#E0A892"><h2 style="color:#8A3415">Como destravar — recolha pra gerar vazios</h2><ul style="margin:0;padding:14px 20px 18px 38px;font-size:13px">${sugestoes}</ul></div>`:''}
    ${faltaPorEstoque.length?`<div class="note" style="border-left-color:var(--gold);margin-bottom:16px">Nos tamanhos ${faltaPorEstoque.map(r=>r.t+'L').join(', ')}, a falta é de <b>estoque</b>, não de vazio — você ainda tem vazios sobrando, mas a necessidade supera tudo que dá pra ter. Aqui só resolve comprando mais vasilhame ou reduzindo o agendado.</div>`:''}
    <div class="panel"><h2>Pedido por tamanho <span class="tag">agendado + ${pedidoMargem}% margem</span></h2>
      <table><thead><tr><th>Tam</th><th class="num">Agendado</th><th class="num">Necessário</th><th class="num">Tenho</th><th class="num">Vazios</th><th class="num">Pedir</th><th class="num">Faltará</th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="note"><b>Necessário</b> = agendado + margem. <b>Pedir</b> = o que falta além do estoque, limitado pelos <b>vazios</b> (troca 1:1). <b style="color:var(--rust)">Faltará</b> = o que você ainda deverá ao cliente depois de usar o estoque e trocar todos os vazios — com a causa: <i>faltam vazios</i> (recolha pra destravar) ou <i>falta estoque</i> (precisa de mais vasilhame).</div>`;
}

const DEPOSITO_PADRAO='principal'; // porta aberta: hoje fixo, vira seletor quando houver +1 depósito
let estoqueFoco='todos'; // todos | disponivel | campo | vazio (destaca a coluna)
let estoqueMostraZerados=false;
let estoqueInventario=false; // modo edição em lote
const COR_EST={disponivel:'var(--green-ok)',campo:'var(--gold)',vazio:'#6B7280'}; // verde / âmbar / cinza
function renderEstoque(){
  const linhas=TAMANHOS.map(t=>{const e=estoqueTam(t);return{...e};});
  const algumDado=temAbertura()||DB.vendas.some(v=>diario(v).some(m=>m.cat==='barril'));
  const tot=linhas.reduce((a,e)=>({disponivel:a.disponivel+e.disponivel,campo:a.campo+e.campo,vazio:a.vazio+e.vazio,total:a.total+e.total}),{disponivel:0,campo:0,vazio:0,total:0});
  const inconsist=linhas.some(e=>e.disponivel<0||e.vazio<0||e.campo<0);
  const f=estoqueFoco;
  // separa tamanhos com giro dos zerados (ponto 1)
  const comGiro=linhas.filter(e=>e.total!==0||e.campo!==0||e.disponivel!==0||e.vazio!==0);
  const zerados=linhas.filter(e=>!(e.total!==0||e.campo!==0||e.disponivel!==0||e.vazio!==0));
  const visiveis=estoqueMostraZerados?linhas:comGiro;

  const card=(estado,titulo,valor,cor,sub)=>`<div class="stat" style="cursor:pointer;${f===estado?'outline:2px solid '+cor+';outline-offset:-1px':''}" onclick="estoqueFoco=${estado==='todos'?"'todos'":"(estoqueFoco==='"+estado+"'?'todos':'"+estado+"')"};render()"><div class="k">${titulo}</div><div class="v mono" style="color:${cor}">${valor}</div><div class="sub">${sub}</div></div>`;

  // destaque por coluna: a coluna do foco fica forte, as outras esmaecem (ponto 4)
  const dim=(col)=>f!=='todos'&&f!==col?'opacity:.32':'';
  const strong=(col)=>f===col?'font-weight:700':'';
  // célula numérica colorida por estado (ponto 2 + 5: alinhada à direita)
  const cel=(val,col,baseCor)=>{
    if(estoqueInventario&&col!=='total'){
      return `<td class="num" style="${dim(col)}"><input type="number" id="inv-${col}-${val.tam}" value="${val.v}" style="width:64px;padding:6px;border:1px solid var(--line);border-radius:7px;text-align:right;font-family:inherit"></td>`;
    }
    const cor=val.v<0?'var(--rust)':(val.v===0?'var(--muted)':baseCor);
    return `<td class="num" style="color:${cor};${dim(col)};${strong(col)}">${val.v}</td>`;
  };
  const linhaTabela=(e)=>{const bad=e.disponivel<0||e.vazio<0||e.campo<0;
    return `<tr class="row">
      <td style="font-weight:600">${e.tam}L${bad?' <span style="color:var(--rust)">⚠</span>':''}</td>
      ${cel({tam:e.tam,v:e.disponivel},'disponivel',COR_EST.disponivel)}
      ${cel({tam:e.tam,v:e.campo},'campo',COR_EST.campo)}
      ${cel({tam:e.tam,v:e.vazio},'vazio',COR_EST.vazio)}
      <td class="num" style="font-weight:600;${dim('total')}">${e.total}</td>
    </tr>`;};
  const rowsTab=visiveis.map(linhaTabela).join('')||`<tr><td colspan="5"><div class="empty" style="padding:24px"><b>Sem barris cadastrados</b></div></td></tr>`;
  // linha de zerados recolhida (ponto 1)
  const linhaZerados=(!estoqueMostraZerados&&zerados.length)?`<tr><td colspan="5" style="text-align:center;padding:10px"><button class="btn ghost sm" onclick="estoqueMostraZerados=true;render()">+ ${zerados.length} tamanho${zerados.length>1?'s':''} sem estoque (${zerados.map(z=>z.tam+'L').join(', ')})</button></td></tr>`:'';
  const linhaRecolher=(estoqueMostraZerados&&zerados.length)?`<tr><td colspan="5" style="text-align:center;padding:8px"><button class="btn ghost sm" onclick="estoqueMostraZerados=false;render()">▴ ocultar tamanhos sem estoque</button></td></tr>`:'';
  // cabeçalho com cores e destaque
  const th=(col,lab,cor)=>`<th class="num" style="color:${f===col?cor:'inherit'};${dim(col)};${strong(col)}">${lab}</th>`;
  const thead=`<tr><th>Tamanho</th>${th('disponivel','Disponível',COR_EST.disponivel)}${th('campo','Em campo',COR_EST.campo)}${th('vazio','Vazios',COR_EST.vazio)}<th class="num" style="${dim('total')}">Total</th></tr>`;

  // botões do topo da tabela: inventário em lote (ponto 3)
  const acoesTabela=estoqueInventario
    ? `<span style="display:flex;gap:8px"><button class="btn ghost sm" onclick="estoqueInventario=false;render()">Cancelar</button><button class="btn gold sm" onclick="salvarInventario()">Salvar inventário</button></span>`
    : `<button class="btn ghost sm" onclick="estoqueInventario=true;render()">Ajustar estoque (inventário)</button>`;

  view.innerHTML=headHTML('Galpão','Estoque do depósito','Quantos barris de cada tamanho você tem, e em que estado. Toque num card para destacar aquele estado. Tudo derivado das movimentações.',
    `<span style="display:flex;gap:8px"><button class="btn ghost" onclick="openTroca()">Registrar troca da fábrica</button><button class="btn gold" onclick="openAbertura()">Cadastrar / atualizar saldo</button></span>`)+
    `<div class="stats" style="grid-template-columns:repeat(4,1fr)">
      ${card('disponivel','Disponível p/ vender',tot.disponivel,COR_EST.disponivel,'cheios no depósito')}
      ${card('campo','Em campo',tot.campo,COR_EST.campo,'com clientes')}
      ${card('vazio','Vazios p/ troca',tot.vazio,COR_EST.vazio,'aguardando a fábrica')}
      ${card('todos','Patrimônio total',tot.total,'var(--ink)','barris seus — ver tudo')}
    </div>

async function salvarInventario(){
  let mudou=0;
  TAMANHOS.forEach(t=>{
    const e=estoqueTam(t);
    ['disponivel','campo','vazio'].forEach(col=>{
      const inp=document.getElementById('inv-'+col+'-'+t);if(!inp)return;
      const novo=+inp.value;const atual=e[col];
      if(novo!==atual){const delta=novo-atual;DB.deposito.push({tipo:'ajuste',deposito:DEPOSITO_PADRAO,tam:t,estado:col,delta,motivo:'inventário',data:iso(today())});mudou++;}
    });
  });
  estoqueInventario=false;await persist();showToast(mudou?mudou+' ajuste(s) de inventário salvos':'Nada alterado');render();
}

  const aReceber=aReceberLista();
  const pf={};
  fechadas.forEach(v=>diario(v).filter(m=>m.cat==='barril'&&m.prodId).forEach(m=>{const sign=m.tipo==='saida'?1:(m.estado==='lacrado'||m.estado==='defeito'?-1:0);if(!sign)return;const l=sign*m.qtd*m.tam;const p=prod(m.prodId);const forn=p?p.fornecedor:'(produto excluído)';const custoL=p?p.custoLitro:0;pf[forn]=pf[forn]||{litros:0,cus:0};pf[forn].litros+=l;pf[forn].cus+=l*custoL;}));

  const f=finFoco;
  const card=(estado,titulo,valor,cor,sub)=>`<div class="stat" style="cursor:pointer;${f===estado?'outline:2px solid '+cor+';outline-offset:-1px':''}" onclick="finFoco=(finFoco==='${estado}'?'resumo':'${estado}');render()"><div class="k">${titulo}</div><div class="v mono" style="font-size:22px;color:${cor}">${valor}</div><div class="sub">${sub}</div></div>`;

  // painel que muda conforme o card
  let painel;
  if(f==='recebido'){
    const rows=pagas.map(v=>`<tr class="row"><td style="font-weight:600">${clienteNome(v.clienteId)}</td><td class="mono">${br(v.dataPagamento)}</td><td>${v.forma||'—'}</td><td>${v.status==='fechada'?'recolhida':'em campo'}</td><td class="num" style="font-weight:600;color:var(--green-ok)">${fmtR(valorVenda(v))}</td></tr>`).join('')||`<tr><td colspan="5"><div class="empty"><b>Nada recebido ainda</b></div></td></tr>`;
    painel=`<div class="panel"><h2>Recebido — vendas pagas <span class="tag">${pagas.length} · ${fmtR(recebidoTotal())}</span></h2><table><thead><tr><th>Cliente</th><th>Pago em</th><th>Forma</th><th>Vasilhame</th><th class="num">Valor</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }else if(f==='receber'){
    const rows=aReceber.map(v=>`<tr class="row"><td style="font-weight:600">${clienteNome(v.clienteId)}</td><td class="mono">${v.vencimento?`<span style="color:${vencido(v)?'var(--rust)':'inherit'}">${br(v.vencimento)}${vencido(v)?' ⚠':''}</span>`:'<span style="color:var(--muted)">sem prazo</span>'}</td><td>${v.status==='aberta'?'em campo':'recolhida'}</td><td class="num" style="font-weight:600;color:var(--gold)">${fmtR(valorVenda(v))}</td><td style="text-align:right"><button class="btn gold sm" onclick="openPagamento(${v.id})">Receber</button></td></tr>`).join('')||`<tr><td colspan="5"><div class="empty"><b>Tudo recebido</b></div></td></tr>`;
    painel=`<div class="panel"><h2>A receber <span class="tag">${aReceber.length} · ${fmtR(totalAReceber())} · vencidos no topo</span></h2><table><thead><tr><th>Cliente</th><th>Vencimento</th><th>Vasilhame</th><th class="num">Valor</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }else if(f==='custo'){
    const fr=Object.entries(pf).map(([fn,v])=>`<tr class="row"><td style="font-weight:600">${fn}</td><td class="num">${v.litros}L</td><td class="num">${fmtR(v.cus)}</td></tr>`).join('')||`<tr><td colspan="3"><div class="empty"><b>Sem vendas acertadas</b></div></td></tr>`;
    painel=`<div class="panel"><h2>Custo do chope consumido por fornecedor <span class="tag">${fmtR(cus)}</span></h2><table><thead><tr><th>Fornecedor</th><th class="num">Litros consumidos</th><th class="num">Custo</th></tr></thead><tbody>${fr}</tbody></table></div>`;
  }else{
    // resumo: resultado por venda acertada
    const rows=fechadas.sort((a,b)=>new Date(b.dataRecolhimento||0)-new Date(a.dataRecolhimento||0)).map(v=>{const r=valorVenda(v),c=custoVenda(v),mg=r-c;return `<tr class="row"><td style="font-weight:600">${clienteNome(v.clienteId)}</td><td class="mono">${br(v.dataRecolhimento)}</td><td>${v.pago?'<span class="st fechada">● pago</span>':'<span class="st aberta">● a receber</span>'}</td><td class="num">${fmtR(r)}</td><td class="num" style="color:var(--muted)">${fmtR(c)}</td><td class="num" style="font-weight:600;color:${mg>0?'var(--green-ok)':'var(--rust)'}">${fmtR(mg)}</td></tr>`;}).join('')||`<tr><td colspan="6"><div class="empty"><b>Nenhuma venda acertada</b>Recolha uma venda para ver o resultado.</div></td></tr>`;
    painel=`<div class="panel"><h2>Resultado por venda acertada <span class="tag">toque num card acima p/ detalhar</span></h2><table><thead><tr><th>Cliente</th><th>Recolhida</th><th>Pgto</th><th class="num">Receita</th><th class="num">Custo</th><th class="num">Margem</th></tr></thead><tbody>${rows}</tbody></table></div>`;
  }

  view.innerHTML=headHTML('Resultado','Financeiro','Toque num card para ver as vendas por trás dele. Receita é caixa recebido (pago), não venda fechada.','')+
    `<div class="stats" style="grid-template-columns:repeat(4,1fr)">
      ${card('recebido','Recebido',fmtR(recebidoTotal()),'var(--green-ok)','dinheiro que entrou')}
      ${card('receber','A receber',fmtR(totalAReceber()),'var(--gold)',aReceber.length+' venda(s) em aberto')}
      ${card('custo','Custo (consumido)',fmtR(cus),'var(--ink)','vendas recolhidas')}
      <div class="stat" style="${f==='resumo'?'outline:2px solid var(--green-ok);outline-offset:-1px':''}"><div class="k">Margem bruta</div><div class="v mono" style="font-size:22px;color:${mar>0?'var(--green-ok)':'var(--rust)'}">${fmtR(mar)}</div><div class="sub">recebido − custo</div></div>
    </div>
    ${painel}
    <div class="note">Recebido = vendas pagas (mesmo ainda em campo). A receber = vendas não pagas. Custo = chope que saiu e foi consumido. Toque nos cards para alternar a lista.</div>`;
}
let co2Foco='todos'; // todos | reabastecer | campo | prontos
function renderCO2(){
  const baixos=cilBaixos(),prontos=cilProntos(),campo=cilCampo();
  const gasTotal=DB.cilindros.reduce((s,c)=>s+c.cargaAtual,0);
  const f=co2Foco;
  const lista=f==='reabastecer'?baixos:f==='campo'?campo:f==='prontos'?prontos:DB.cilindros.slice();
  const ordenada=lista.slice().sort((a,b)=>a.cargaAtual-b.cargaAtual);
  const linha=(c)=>{const baixo=c.status==='disponivel'&&c.cargaAtual<CIL_REABASTECER;const pct=Math.max(0,Math.min(100,c.cargaAtual/c.capacidade*100));
    const ult=c.pesagens.slice(-1)[0];
    return `<tr class="row">
      <td><span class="chip tag">${c.etiqueta}</span> <b>${c.capacidade}kg</b>${baixo?' <span style="color:var(--rust);font-weight:600">⚠ reabastecer</span>':''}</td>
      <td>${c.status==='campo'?`<span class="st aberta">● em campo</span>`:`<span class="st fechada">● no depósito</span>`}</td>
      <td><div style="display:flex;align-items:center;gap:8px"><div style="flex:1;max-width:120px;height:7px;background:var(--line);border-radius:4px;overflow:hidden"><div style="width:${pct}%;height:100%;background:${baixo?'var(--rust)':pct<40?'var(--gold)':'var(--green-ok)'}"></div></div><span class="mono" style="font-weight:600;font-size:13px;color:${baixo?'var(--rust)':'inherit'}">${c.cargaAtual.toFixed(1)}kg</span></div>${ult?`<div style="font-size:11px;color:var(--muted);margin-top:2px">última pesagem ${br(ult.data)}</div>`:''}</td>
      <td class="num" style="color:var(--muted);font-size:12.5px">tara ${c.tara}kg</td>
      <td style="text-align:right">${c.status==='disponivel'?`<button class="btn gold sm" onclick="openEncher(${c.id})">Encher</button> <button class="btn ghost sm" onclick="openPesar(${c.id})">Pesar</button>`:`<span style="color:var(--muted);font-size:12px">volta com a venda</span>`} <button class="btn ghost sm" onclick="openCilEdit(${c.id})">Ficha</button></td>
    </tr>`;};
  const rows=ordenada.map(linha).join('')||`<tr><td colspan="5"><div class="empty"><b>Nenhum cilindro</b>Cadastre seus cilindros para controlar a carga de gás.</div></td></tr>`;
  const card=(estado,titulo,valor,cor,sub)=>`<div class="stat" style="cursor:pointer;${f===estado?'outline:2px solid '+cor+';outline-offset:-1px':''}" onclick="co2Foco=${estado==='todos'?"'todos'":"(co2Foco==='"+estado+"'?'todos':'"+estado+"')"};render()"><div class="k">${titulo}</div><div class="v mono"${cor?` style="color:${cor}"`:''}>${valor}</div>${sub?`<div class="sub">${sub}</div>`:''}</div>`;
  const tituloTab=f==='reabastecer'?'Precisam reabastecer':f==='campo'?'Em campo':f==='prontos'?'Prontos no depósito':'Todos os cilindros';
  view.innerHTML=headHTML('Gás','Cilindros de CO₂','Controle de carga por cilindro. Você pesa quando o cilindro está na mão; a carga = peso na balança − tara. Abaixo de 1kg, ele aparece como "reabastecer".',
    `<button class="btn gold" onclick="openCilNovo()">+ Cadastrar cilindro</button>`)+
    `<div class="stats" style="grid-template-columns:repeat(4,1fr)">
      ${card('reabastecer','Precisam reabastecer',baixos.length,'var(--rust)','abaixo de 1kg')}
      ${card('prontos','Prontos p/ usar',prontos.length,'var(--green-ok)','com gás no depósito')}
      ${card('campo','Em campo',campo.length,'var(--gold)','com clientes')}
      ${card('todos','Gás total estimado',gasTotal.toFixed(1)+'kg','','soma das últimas pesagens')}
    </div>
    ${baixos.length&&f==='todos'?`<div class="note" style="border-left-color:var(--rust);margin-bottom:16px;color:#8A3415"><b>${baixos.length} cilindro(s) precisam reabastecer</b> — estão no depósito com menos de 1kg de gás. Toque no card vermelho para ver quais.</div>`:''}
    <div class="panel"><h2>${tituloTab} <span class="tag">${ordenada.length}${f!=='todos'?' · toque no card de novo p/ ver todos':''}</span></h2><table><thead><tr><th>Cilindro</th><th>Onde</th><th>Carga de gás</th><th class="num">Ficha</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>
    <div class="note">A carga só atualiza quando <b>você pesa</b> — o sistema não mede o consumo em campo. Pese o cilindro quando ele voltar, e a carga reflete a última leitura. "Encher" registra a carga cheia após recarregar na fábrica.</div>`;
}
function openCilNovo(){
  open(`<header><h3>Cadastrar cilindro</h3><p>Cada cilindro é uma unidade com etiqueta e ficha própria.</p></header>
  <div class="body">
    <div class="grid2"><div class="field"><label>Etiqueta</label><input id="cl-etq" placeholder="CIL-001"></div><div class="field"><label>Capacidade (kg)</label><input id="cl-cap" type="number" step="0.5" value="6"></div></div>
    <div class="grid2"><div class="field"><label>Tara — peso do vazio (kg)</label><input id="cl-tara" type="number" step="0.1" placeholder="ex.: 9.5"></div><div class="field"><label>Carga atual de gás (kg)</label><input id="cl-carga" type="number" step="0.1" placeholder="0 se vazio"></div></div>
    <div class="note">A tara você pesa uma vez com o cilindro vazio e anota aqui. Se cadastrar já cheio, ponha a carga = capacidade.</div>
  </div>
  <footer><span></span><button class="btn gold" onclick="saveCilNovo()">Cadastrar</button></footer>`);
}
async function saveCilNovo(){
  const etq=document.getElementById('cl-etq').value.trim();if(!etq){showToast('Informe a etiqueta');return;}
  const cap=+document.getElementById('cl-cap').value||6,tara=+document.getElementById('cl-tara').value||0,carga=+document.getElementById('cl-carga').value||0;
  DB.cilindros.push({id:_clid++,etiqueta:etq,capacidade:cap,tara,cargaAtual:Math.min(carga,cap),status:'disponivel',vendaId:null,pesagens:[]});
  await persist();close();showToast('Cilindro cadastrado');render();
}
function openCilEdit(id){const c=cil(id);
  open(`<header><h3>Ficha — ${c.etiqueta}</h3></header>
  <div class="body">
    <div class="grid2"><div class="field"><label>Etiqueta</label><input id="cl-etq" value="${c.etiqueta}"></div><div class="field"><label>Capacidade (kg)</label><input id="cl-cap" type="number" step="0.5" value="${c.capacidade}"></div></div>
    <div class="field"><label>Tara — peso do vazio (kg)</label><input id="cl-tara" type="number" step="0.1" value="${c.tara}"></div>
    ${c.pesagens.length?`<div class="field"><label>Histórico de pesagens</label><div style="font-size:12.5px;color:var(--muted)">${c.pesagens.slice(-5).reverse().map(p=>`${br(p.data)}: ${p.carga.toFixed(1)}kg${p.pesoBalanca?' (balança '+p.pesoBalanca+'kg)':''}`).join('<br>')}</div></div>`:''}
  </div>
  <footer><span></span><button class="btn primary" onclick="saveCilEdit(${id})">Salvar</button></footer>`);
}
async function saveCilEdit(id){const c=cil(id);
  c.etiqueta=document.getElementById('cl-etq').value.trim()||c.etiqueta;c.capacidade=+document.getElementById('cl-cap').value||c.capacidade;c.tara=+document.getElementById('cl-tara').value||c.tara;
  await persist();close();showToast('Ficha atualizada');render();
}
function openEncher(id){const c=cil(id);
  open(`<header><h3>Encher ${c.etiqueta}</h3><p>Registra a carga cheia após recarregar na fábrica.</p></header>
  <div class="body"><div class="field"><label>Carga de gás após encher (kg)</label><input id="cl-carga" type="number" step="0.1" value="${c.capacidade}"></div>
  <div class="note">Normalmente igual à capacidade (${c.capacidade}kg). Ajuste se a fábrica encheu menos.</div></div>
  <footer><span></span><button class="btn gold" onclick="saveEncher(${id})">Registrar cheio</button></footer>`);
}
async function saveEncher(id){const c=cil(id);const carga=Math.min(+document.getElementById('cl-carga').value||c.capacidade,c.capacidade);
  c.cargaAtual=carga;c.pesagens.push({data:iso(today()),pesoBalanca:null,carga});
  await persist();close();showToast('Cilindro cheio registrado');render();
}
function openPesar(id){const c=cil(id);
  open(`<header><h3>Pesar ${c.etiqueta}</h3><p>Ponha na balança. A carga de gás = peso total − tara (${c.tara}kg).</p></header>
  <div class="body"><div class="field"><label>Peso na balança (kg)</label><input id="cl-peso" type="number" step="0.1" placeholder="ex.: ${(c.tara+c.cargaAtual).toFixed(1)}" oninput="document.getElementById('cl-calc').textContent='Gás: '+Math.max(0,(+this.value-${c.tara})).toFixed(1)+'kg'"></div>
  <div id="cl-calc" style="font-weight:600;color:var(--gold)">Gás: —</div>
  <div class="note">Se o peso for menor que a tara, algo está errado na medida — confira a tara na ficha.</div></div>
  <footer><span></span><button class="btn primary" onclick="savePesar(${id})">Registrar pesagem</button></footer>`);
}
async function savePesar(id){const c=cil(id);const peso=+document.getElementById('cl-peso').value;
  if(!peso){showToast('Informe o peso da balança');return;}
  const carga=Math.max(0,+(peso-c.tara).toFixed(1));
  c.cargaAtual=carga;c.pesagens.push({data:iso(today()),pesoBalanca:peso,carga});
  await persist();close();showToast('Pesagem registrada · gás '+carga+'kg');render();
}

  const pago=document.getElementById('v-pago').value==='sim';
  const venc=document.getElementById('v-venc').value||null;
  const itens=vItens.map(it=>({cat:'barril',tam:it.tam,prodId:it.prodId,qtd:it.qtd}));
  const equipMovs=Object.entries(vEquip).filter(([id,q])=>q>0).map(([id,q])=>({tipo:'saida',cat:'equip',equipId:+id,qtd:q,data}));
  const v={id:_vid++,clienteId:cli,dataEntrega:data,horaEntrega:hora,dataRecolhe:null,horaRecolhe:null,dataRecolhimento:null,status:'aberta',valor:isNaN(valor)?null:valor,
    pago,dataPagamento:pago?(document.getElementById('v-pagdata').value||data):null,forma:pago?(document.getElementById('v-forma').value||null):null,vencimento:venc,
    chopeiraModelo:document.getElementById('v-chopmod')?document.getElementById('v-chopmod').value:'',
    enderecoEntrega:(document.getElementById('v-end')?document.getElementById('v-end').value.trim():'')||null,
    refEntrega:(document.getElementById('v-endref')?document.getElementById('v-endref').value.trim():'')||null,
    obs:(document.getElementById('v-obs')?document.getElementById('v-obs').value.trim():'')||null,
    itens,chopeiraIds:[],
    movs:[...itens.map(i=>({tipo:'saida',cat:'barril',tam:i.tam,prodId:i.prodId,qtd:i.qtd,data})),...equipMovs]};
  DB.vendas.push(v);
