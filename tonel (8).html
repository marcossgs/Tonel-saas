function quitarCliente(cid,escopo){
  const todas=DB.vendas.filter(v=>v.clienteId===cid&&!v.pago);
  const pend=escopo==='recolhidos'?todas.filter(v=>v.status!=='aberta'):todas;
  const total=pend.reduce((s,v)=>s+valorVenda(v),0);
  const titulo=escopo==='recolhidos'?'Quitar recolhidos':'Quitar tudo';
  const aviso=escopo==='recolhidos'
    ?'Marca como pago só o que já foi <b>recolhido</b> (material de volta). O que ainda está em campo permanece em aberto.'
    :'Marca como pago <b>tudo</b> que está em aberto, inclusive o que ainda está em campo. Use quando o cliente quitou tudo, mesmo adiantado.';
  open(`<header><h3>${titulo} — ${clienteNome(cid)}</h3><p>Registrar o pagamento de <b>${pend.length} pendência(s)</b>, somando <b>${fmtR(total)}</b>.</p></header>

    <div style="max-height:180px;overflow:auto;border:1px solid var(--line);border-radius:9px;margin-bottom:14px">
      ${pend.map(v=>`<div style="display:flex;justify-content:space-between;padding:9px 14px;border-bottom:1px solid var(--line);font-size:13px"><span>venda ${br(v.dataEntrega)} ${v.status!=='aberta'?'<span style="color:#8A3415">· recolhida</span>':'<span style="color:var(--muted)">· em campo</span>'}</span><span style="font-weight:600">${fmtR(valorVenda(v))}</span></div>`).join('')}
    </div>
    <div class="grid2"><div class="field"><label>Data do recebimento</label><input id="qt-data" type="date" value="${iso(today())}"></div>
    <div class="field"><label>Forma (opcional)</label><select id="qt-forma"><option value="">— não informar —</option><option>Pix</option><option>Dinheiro</option><option>Transferência</option><option>Boleto</option></select></div></div>
    <div class="note" style="margin-top:4px">${aviso} Se foi pagamento parcial, use o "Pagar" de cada venda.</div>
  </div>
  <footer><span></span><button class="btn primary" onclick="confirmQuitarCliente(${cid},'${escopo}')">Confirmar ${fmtR(total)}</button></footer>`);
}
async function confirmQuitarCliente(cid,escopo){
  const data=document.getElementById('qt-data').value;const forma=document.getElementById('qt-forma').value||null;
  const todas=DB.vendas.filter(v=>v.clienteId===cid&&!v.pago);
  const pend=escopo==='recolhidos'?todas.filter(v=>v.status!=='aberta'):todas;
  let n=0;pend.forEach(v=>{v.pago=true;v.dataPagamento=data;v.forma=forma;n++;});

}

async function saveReserva(){
  const cli=+document.getElementById('r-cli').value,data=document.getElementById('r-data').value;
  if(!cli){showToast('Escolha o cliente');return;}
  // PROTEÇÃO: impede reservar uma chopeira que já está em outra reserva futura
  const conflito=chopeirasEmConflito(rChops);
  if(conflito.length){
    const nomes=conflito.map(id=>{const c=DB.chopeiras.find(x=>x.id===id);const r=reservaChopeira(id);return `${c.etiqueta} (já reservada p/ ${clienteNome(r.clienteId)} em ${br(r.dataEvento)})`;}).join('; ');
    showToast('Chopeira indisponível: '+nomes,5000);
    return;
  }
  DB.reservas.push({id:_rid++,clienteId:cli,dataEvento:data,itens:rItens.map(i=>({cat:'barril',tam:i.tam,prodId:i.prodId,qtd:i.qtd})),chopeiraIds:rChops.slice(),obs:document.getElementById('r-obs').value.trim(),status:'reservada'});
  await persist();close();showToast('Evento reservado');render();
}

let recState=null;
function openRecolhimento(vid){
  const v=DB.vendas.find(x=>x.id===vid);
  const emc=emCampoItens(v).filter(g=>g.cat==='barril');
  recState={vid,ret:{}};
  emc.forEach((g,idx)=>recState.ret[idx]={lacrado:0,vazio:g.qtd,defeito:0,max:g.qtd,tam:g.tam,prodId:g.prodId});
  const equipsEmc=equipEmCampoVenda(v);
  const chs=v.chopeiraIds.map(id=>DB.chopeiras.find(x=>x.id===id)).filter(c=>c&&c.status==='campo'&&c.vendaId===v.id);
  open(`<header><h3>Recolher — ${clienteNome(v.clienteId)}</h3><p>Entregue em ${br(v.dataEntrega)}. Informe o que voltou agora. Pode ser parcial: o que ficar em campo mantém a venda aberta.</p></header>
  <div class="body">
    <div class="field"><label>Data do recolhimento</label><input id="rc-data" type="date" value="${iso(today())}"></div>
    ${emc.length?`<div><div style="font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;margin-bottom:8px">Barris em campo — quanto voltou e em que estado</div>
      ${emc.map((g,idx)=>`<div style="border:1px solid var(--line);border-radius:10px;padding:11px 13px;margin-bottom:8px">
        <div style="font-weight:600;margin-bottom:8px">${g.qtd}× ${g.tam}L <span style="color:var(--muted);font-weight:400">${prod(g.prodId)?prod(g.prodId).estilo+' · '+prod(g.prodId).fornecedor:''}</span></div>
        <div class="grid3">
          <div class="field" style="margin:0"><label style="font-size:11px;color:var(--green-ok)">Vazio (consumido)</label><input id="rc-v-${idx}" type="number" min="0" max="${g.qtd}" value="${g.qtd}" onchange="setRet(${idx},'vazio',+this.value)"></div>
          <div class="field" style="margin:0"><label style="font-size:11px">Lacrado (não usado)</label><input id="rc-l-${idx}" type="number" min="0" max="${g.qtd}" value="0" onchange="setRet(${idx},'lacrado',+this.value)"></div>
          <div class="field" style="margin:0"><label style="font-size:11px;color:var(--rust)">Defeito / perda</label><input id="rc-d-${idx}" type="number" min="0" max="${g.qtd}" value="0" onchange="setRet(${idx},'defeito',+this.value)"></div>
        </div>
        <div id="rc-fica-${idx}" style="font-size:11.5px;color:var(--muted);margin-top:6px"></div>
      </div>`).join('')}</div>`:'<div class="note">Nenhum barril em campo nesta venda.</div>'}
    ${equipsEmc.length?`<div class="field"><label>Equipamentos em campo — recolher</label>${equipsEmc.map(g=>`<label style="display:flex;align-items:center;gap:8px;font-weight:400;margin-bottom:5px"><input type="checkbox" id="rc-eq-${g.equipId}" checked style="width:auto"> ${g.qtd}× ${g.nome} <span style="color:var(--muted);font-size:12px">(${g.classe==='cilindro'?'cilindro':'manômetro'})</span></label>`).join('')}</div>`:''}
    ${chs.length?`<div class="field"><label>Chopeiras — destino ao voltar</label>${chs.map(c=>`<div style="display:flex;gap:8px;align-items:center;margin-bottom:6px"><label style="display:flex;align-items:center;gap:6px;font-weight:400;margin:0"><input type="checkbox" id="rc-chrec-${c.id}" checked style="width:auto"> <span class="chip tag">${c.etiqueta}</span> ${c.modelo}</label><select id="rc-ch-${c.id}" style="margin-left:auto;width:auto;padding:6px 10px"><option value="disponivel">Volta pronta</option><option value="manutencao">Precisa limpeza/manutenção</option></select></div>`).join('')}</div>`:''}
    <div class="field"><label>Valor cobrado (R$) — total da venda</label><input id="rc-valor" type="number" min="0" step="0.01" value="${(v.valor!=null?v.valor:valorSugerido(v)).toFixed(2)}"><div class="note" style="margin-top:8px">Sugestão sobre o consumido (vazio) × preço. Lacrado e defeito não entram. Ajuste para descontos.</div></div>
    ${v.pago?'<div class="note" style="border-left-color:var(--green-ok)">Esta venda já está paga.</div>':`<div class="field"><label><input type="checkbox" id="rc-pago" style="width:auto;margin-right:8px;vertical-align:middle">Recebi o pagamento agora</label></div>`}
  </div>
  <footer><span class="acerto" id="rc-resumo"></span><button class="btn primary" onclick="confirmRecolhimento()">Registrar recolhimento</button></footer>`);
  recalcRec();
}
function setRet(idx,estado,n){const r=recState.ret[idx];r[estado]=n;
  let soma=r.vazio+r.lacrado+r.defeito;
  if(soma>r.max){const excesso=soma-r.max;r[estado]=Math.max(0,n-excesso);const el=document.getElementById('rc-'+estado[0]+'-'+idx);if(el)el.value=r[estado];}
  recalcRec();}
function recalcRec(){
  const v=DB.vendas.find(x=>x.id===recState.vid);
  let totalVol=0,totalLac=0,totalDef=0;
  Object.values(recState.ret).forEach(r=>{totalVol+=r.vazio;totalLac+=r.lacrado;totalDef+=r.defeito;});
  const emc=emCampoItens(v).filter(g=>g.cat==='barril');
  emc.forEach((g,idx)=>{const r=recState.ret[idx];const fica=g.qtd-(r.vazio+r.lacrado+r.defeito);
    const el=document.getElementById('rc-fica-'+idx);if(el)el.textContent=fica>0?`fica ${fica} em campo (venda continua aberta)`:'tudo recolhido';});
  const tmp=JSON.parse(JSON.stringify(v));
  emc.forEach((g,idx)=>{const r=recState.ret[idx];['lacrado','vazio','defeito'].forEach(es=>{if(r[es]>0)tmp.movs.push({tipo:'retorno',cat:'barril',tam:g.tam,prodId:g.prodId,qtd:r[es],data:'tmp',estado:es});});});
  const sug=valorSugerido(tmp);
  const vi=document.getElementById('rc-valor');if(vi&&document.activeElement!==vi&&v.valor==null)vi.value=sug.toFixed(2);
  const rr=document.getElementById('rc-resumo');if(rr)rr.innerHTML=`voltando: <b>${totalVol}</b> vazio · <b>${totalLac}</b> lacrado${totalDef?` · <b style="color:var(--rust)">${totalDef}</b> defeito`:''}`;
}
async function confirmRecolhimento(){
  const v=DB.vendas.find(x=>x.id===recState.vid);
  const data=document.getElementById('rc-data').value;
  const emc=emCampoItens(v).filter(g=>g.cat==='barril');
  emc.forEach((g,idx)=>{const r=recState.ret[idx];['lacrado','vazio','defeito'].forEach(es=>{if(r[es]>0)v.movs.push({tipo:'retorno',cat:'barril',tam:g.tam,prodId:g.prodId,qtd:r[es],data,estado:es});});});
  const equipsEmc=equipEmCampoVenda(v);
  equipsEmc.forEach(g=>{const chk=document.getElementById('rc-eq-'+g.equipId);if(!chk||chk.checked)v.movs.push({tipo:'retorno',cat:'equip',equipId:g.equipId,qtd:g.qtd,data});});
  v.chopeiraIds.forEach(id=>{const c=DB.chopeiras.find(x=>x.id===id);if(!c||c.status!=='campo'||c.vendaId!==v.id)return;const chk=document.getElementById('rc-chrec-'+id);if(chk&&!chk.checked)return;
    const sel=document.getElementById('rc-ch-'+id);const dest=sel?sel.value:'disponivel';
    c.eventos.push({tipo:'retorno',data,clienteId:c.clienteId});c.clienteId=null;c.desde=null;c.vendaId=null;
    if(dest==='manutencao'){c.status='manutencao';c.eventos.push({tipo:'manutencao',data,nota:'limpeza/manutenção'});}else c.status='disponivel';});
  const valEl=document.getElementById('rc-valor');if(valEl)v.valor=parseFloat(valEl.value)||0;
  const pagchk=document.getElementById('rc-pago');if(pagchk&&pagchk.checked){v.pago=true;v.dataPagamento=data;}
  recalcStatusVenda(v);
  if(v.status==='fechada')v.dataRecolhimento=data;
  await persist();close();showToast(v.status==='fechada'?'Recolhido — venda fechada':'Recolhimento parcial — venda segue aberta');render();
}

let repState=null;
function openAgendarRecolhe(vid){

  open(`<header><h3>Agendar recolhimento — ${c.nome||''}</h3><p>Quando você combinou de buscar o vasilhame? Aparece na Semana, no dia certo, junto das instalações.</p></header>
  <div class="body">
    <div class="grid2"><div class="field"><label>Dia da busca</label><input id="ar-data" type="date" value="${v.dataRecolhe||iso(today())}"></div><div class="field"><label>Hora combinada</label><input id="ar-hora" type="time" value="${v.horaRecolhe||'09:00'}"></div></div>
    <div class="note">Isto agenda a busca — o acerto (o que voltou, vazio/lacrado) você faz no botão "Recolher" quando chegar lá. Se sobrar vasilhame, é só agendar de novo.</div>
    ${v.dataRecolhe?`<div class="field"><label><input type="checkbox" id="ar-limpa" style="width:auto;margin-right:8px;vertical-align:middle">Remover agendamento (volta pra lista sem data)</label></div>`:''}
  </div>
  <footer><span></span><button class="btn gold" onclick="saveAgendarRecolhe(${vid})">Salvar agendamento</button></footer>`);
}
async function saveAgendarRecolhe(vid){
  const v=DB.vendas.find(x=>x.id===vid);
  const limpa=document.getElementById('ar-limpa');
  if(limpa&&limpa.checked){v.dataRecolhe=null;v.horaRecolhe=null;}
  else{v.dataRecolhe=document.getElementById('ar-data').value;v.horaRecolhe=document.getElementById('ar-hora').value;}
  await persist();close();showToast('Recolhimento agendado');render();
}
function openRepor(vid){
  const v=DB.vendas.find(x=>x.id===vid);
  repState={vid,saidas:[{tam:50,prodId:DB.produtos[0]?DB.produtos[0].id:null,qtd:1}],retornos:{}};
  const emc=emCampoItens(v).filter(g=>g.cat==='barril');
  emc.forEach((g,idx)=>repState.retornos[idx]={vazio:0,tam:g.tam,prodId:g.prodId,max:g.qtd});
  open(`<header><h3>Repor / trocar — ${clienteNome(v.clienteId)}</h3><p>No meio do evento: leve mais barril (reposição) e/ou recolha vazios sem fechar a venda.</p></header>
  <div class="body">
    <div class="field"><label>Data</label><input id="rp-data" type="date" value="${iso(today())}"></div>
    <div class="field"><label>Levar mais (reposição)</label><div id="rp-saidas"></div><button class="addline" onclick="rpAddSaida()">+ Adicionar barril a levar</button></div>
    ${emc.length?`<div class="field"><label>Recolher vazios agora (opcional)</label>${emc.map((g,idx)=>`<div style="display:grid;grid-template-columns:1fr .8fr;gap:8px;align-items:center;margin-bottom:6px"><span>${g.qtd}× ${g.tam}L ${prod(g.prodId)?prod(g.prodId).estilo:''}</span><input type="number" min="0" max="${g.qtd}" value="0" placeholder="qtd vazia" onchange="repState.retornos[${idx}].vazio=+this.value"></div>`).join('')}</div>`:''}
  </div>
  <footer><span></span><button class="btn gold" onclick="confirmRepor()">Registrar movimento</button></footer>`);
  rpDrawSaidas();
}
function rpAddSaida(){repState.saidas.push({tam:50,prodId:DB.produtos[0]?DB.produtos[0].id:null,qtd:1});rpDrawSaidas();}
function rpDrawSaidas(){
  document.getElementById('rp-saidas').innerHTML=repState.saidas.map((s,i)=>`<div class="itemrow" style="margin-bottom:6px"><div class="field"><label>${i===0?'Tam':''}</label><select onchange="repState.saidas[${i}].tam=+this.value">${TAMANHOS.map(t=>`<option value="${t}" ${s.tam===t?'selected':''}>${t}L</option>`).join('')}</select></div><div class="field"><label>${i===0?'Produto':''}</label><select onchange="repState.saidas[${i}].prodId=+this.value">${produtosAtivos().map(p=>`<option value="${p.id}" ${s.prodId===p.id?'selected':''}>${p.estilo}</option>`).join('')}</select></div><div class="field"><label>${i===0?'Qtd':''}</label><input type="number" min="0" value="${s.qtd}" onchange="repState.saidas[${i}].qtd=+this.value"></div><button class="x" onclick="repState.saidas.splice(${i},1);rpDrawSaidas()" ${repState.saidas.length===1?'style="visibility:hidden"':''}>×</button></div>`).join('');
}
async function confirmRepor(){
  const v=DB.vendas.find(x=>x.id===repState.vid);const data=document.getElementById('rp-data').value;
  repState.saidas.forEach(s=>{if(s.qtd>0)v.movs.push({tipo:'saida',cat:'barril',tam:s.tam,prodId:s.prodId,qtd:s.qtd,data});});
  Object.values(repState.retornos).forEach(r=>{if(r.vazio>0)v.movs.push({tipo:'retorno',cat:'barril',tam:r.tam,prodId:r.prodId,qtd:r.vazio,data,estado:'vazio'});});
  recalcStatusVenda(v);
  await persist();close();showToast('Movimento registrado no diário');render();
}

// chopeira manutenção (avulsa)
function manutChopeira(id){const c=DB.chopeiras.find(x=>x.id===id);open(`<header><h3>Enviar ${c.etiqueta} para manutenção</h3></header><div class="body"><div class="field"><label>O que será feito</label><input id="mc-obs" placeholder="ex.: limpeza, troca de sifão"></div><div class="field"><label>Data</label><input id="mc-data" type="date" value="${iso(today())}"></div></div><footer><span></span><button class="btn primary" onclick="confirmManut(${id})">Enviar</button></footer>`);}
async function confirmManut(id){const c=DB.chopeiras.find(x=>x.id===id);c.status='manutencao';c.eventos.push({tipo:'manutencao',data:document.getElementById('mc-data').value,nota:document.getElementById('mc-obs').value.trim()||'manutenção'});await persist();close();showToast('Enviada para manutenção');render();}
async function liberarChopeira(id){const c=DB.chopeiras.find(x=>x.id===id);c.status='disponivel';c.eventos.push({tipo:'limpeza',data:iso(today()),nota:'liberada'});await persist();showToast(c.etiqueta+' pronta');render();}

function openChopeira(){open(`<header><h3>Cadastrar chopeira</h3><p>Cada chopeira ganha etiqueta e ficha técnica próprias.</p></header><div class="body"><div class="grid2"><div class="field"><label>Etiqueta / nº</label><input id="nc-et" placeholder="ex.: CH-007"></div><div class="field"><label>Modelo</label><input id="nc-mod" placeholder="Upper, Slim…"></div></div><div class="grid3"><div class="field"><label>Torneiras</label><input id="nc-tor" type="number" min="1" value="1"></div><div class="field"><label>Resfriamento (L/h)</label><input id="nc-res" type="number" min="0" placeholder="120"></div><div class="field"><label>Potência (W)</label><input id="nc-pot" type="number" min="0" placeholder="240"></div></div><div class="note">O resfriamento (litros gelados por hora) ajuda a escolher a chopeira certa para o porte do evento.</div></div><footer><span></span><button class="btn gold" onclick="saveChopeira()">Cadastrar</button></footer>`);}
async function saveChopeira(){const et=document.getElementById('nc-et').value.trim(),mod=document.getElementById('nc-mod').value.trim();if(!et||!mod){showToast('Informe etiqueta e modelo');return;}DB.chopeiras.push({id:_cid++,etiqueta:et,modelo:mod,torneiras:+document.getElementById('nc-tor').value||1,resfriamento:+document.getElementById('nc-res').value||0,potencia:+document.getElementById('nc-pot').value||0,status:'disponivel',clienteId:null,desde:null,vendaId:null,eventos:[{tipo:'cadastro',data:iso(today())}]});await persist();close();showToast('Chopeira cadastrada');render();}
function openCliente(){open(`<header><h3>Novo cliente</h3></header><div class="body"><div class="grid2"><div class="field"><label>Nome</label><input id="c-nome" placeholder="Nome do cliente"></div><div class="field"><label>Telefone</label><input id="c-tel" placeholder="(35) 9...."></div></div><div class="field"><label>Documento <span style="color:var(--muted);font-weight:400">(CPF, CNPJ ou outro)</span></label><input id="c-doc" placeholder="opcional"></div><div class="field"><label>Endereço</label><input id="c-end" placeholder="Rua, número"></div><div class="grid2"><div class="field"><label>Cidade</label><input id="c-cidade" placeholder="Cidade"></div><div class="field"><label>Ponto de referência</label><input id="c-ref" placeholder="ex.: em frente à praça"></div></div></div><footer><span></span><button class="btn primary" onclick="saveCliente()">Salvar</button></footer>`);}
async function saveCliente(){const n=document.getElementById('c-nome').value.trim();if(!n){showToast('Informe o nome');return;}DB.clientes.push({id:Math.max(0,...DB.clientes.map(c=>c.id))+1,nome:n,cidade:document.getElementById('c-cidade').value.trim(),tel:document.getElementById('c-tel').value.trim(),documento:document.getElementById('c-doc').value.trim(),endereco:document.getElementById('c-end').value.trim(),ref:document.getElementById('c-ref').value.trim()});await persist();close();showToast('Cliente adicionado');render();}
function openProduto(id){
  const p=id?DB.produtos.find(x=>x.id===id):null;
  open(`<header><h3>${p?'Editar produto':'Novo produto'}</h3><p>Estilo + fornecedor, custo e preço por litro.${p?' Alterações valem para vendas novas.':''}</p></header><div class="body"><div class="grid2"><div class="field"><label>Estilo</label><input id="p-est" placeholder="Lager, IPA…" value="${p?p.estilo:''}"></div><div class="field"><label>Fornecedor</label><input id="p-forn" placeholder="Antártica, Skol…" value="${p?p.fornecedor:''}"></div></div><div class="grid2"><div class="field"><label>Custo/L (R$)</label><input id="p-custo" type="number" step="0.01" min="0" value="${p?p.custoLitro:''}"></div><div class="field"><label>Preço/L (R$)</label><input id="p-preco" type="number" step="0.01" min="0" value="${p?p.precoLitro:''}"></div></div></div><footer><span></span><button class="btn primary" onclick="saveProduto(${id||0})">Salvar</button></footer>`);
}
async function saveProduto(id){
  const e=document.getElementById('p-est').value.trim(),f=document.getElementById('p-forn').value.trim();
  if(!e||!f){showToast('Informe estilo e fornecedor');return;}
  const custo=parseFloat(document.getElementById('p-custo').value)||0,preco=parseFloat(document.getElementById('p-preco').value)||0;
  if(id){const p=DB.produtos.find(x=>x.id===id);p.estilo=e;p.fornecedor=f;p.custoLitro=custo;p.precoLitro=preco;showToast('Produto atualizado');}
  else{DB.produtos.push({id:Math.max(0,...DB.produtos.map(p=>p.id))+1,estilo:e,fornecedor:f,custoLitro:custo,precoLitro:preco});showToast('Produto adicionado');}
  await persist();close();render();
}
async function excluirProduto(id){
  const p=DB.produtos.find(x=>x.id===id);if(!p)return;
  const nv=DB.vendas.filter(v=>diario(v).some(m=>m.prodId===id)).length;
  if(nv>0){
    open(`<header><h3>Excluir ${p.estilo} · ${p.fornecedor}?</h3></header>
    <div class="body"><div class="note" style="border-left-color:var(--rust);color:#8A3415">Este produto está em <b>${nv} venda(s)</b>. Excluir vai deixar essas vendas <b>sem produto</b> — o cálculo de custo, preço e litros delas fica comprometido, e o financeiro desses períodos pode não bater.</div>
    <div style="font-size:13px;color:var(--muted)">Se a ideia é só tirar das opções de novas vendas mantendo o histórico, prefira <b>Arquivar</b>. Excluir é definitivo.</div></div>
    <footer><button class="btn ghost" onclick="close()">Cancelar</button><button class="btn" style="background:var(--rust);color:#fff" onclick="confirmExcluirProduto(${id})">Excluir mesmo assim</button></footer>`);
    return;
  }
  DB.produtos=DB.produtos.filter(p=>p.id!==id);await persist();showToast('Produto excluído');render();
}
async function confirmExcluirProduto(id){DB.produtos=DB.produtos.filter(p=>p.id!==id);await persist();close();showToast('Produto excluído');render();}
async function arquivarProduto(id){const p=DB.produtos.find(x=>x.id===id);p.arquivado=true;await persist();showToast('Produto arquivado');render();}
async function desarquivarProduto(id){const p=DB.produtos.find(x=>x.id===id);p.arquivado=false;await persist();showToast('Produto reativado');render();}

(async()=>{await seedIfEmpty();render();})();
</script>
